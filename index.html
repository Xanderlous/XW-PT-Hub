o hold a joint or body segment steady so the prime movers can work. It does not create the movement itself; it keeps posture and the load in position."},{id:182,section:"2",chapter:"2.5.2",chapterName:"The Squat",topic:"Muscles Worked",question:"What are the target muscles in the squat?",answer:"Gluteus maximus and quadriceps femoris."},{id:183,section:"2",chapter:"2.5.2",chapterName:"The Squat",topic:"Muscles Worked",question:"What are the synergist muscles in the squat?",answer:"Hamstrings, gastrocnemius, and soleus."},{id:184,section:"2",chapter:"2.5.2",chapterName:"The Squat",topic:"Muscles Worked",question:"What are the stabilizer muscles in the squat?",answer:"Abdominals, erector spinae, upper trapezius, anterior deltoid, and pelvic diaphragm."},{id:185,section:"2",chapter:"2.5.2",chapterName:"The Squat",topic:"Muscles Worked",question:"Is the latissimus dorsi a working muscle in the squat?",answer:"Not as a prime mover or synergist. It plays a minor stabilizing role, helping brace the torso and control the bar, which is more pronounced under heavy load and in the back squat (where the lats create a tight shelf for the bar). Standard squat muscle classifications usually don't list it among the main stabilizers."},{id:400,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Biomechanics Recap",question:"For free weights, what is the line of action (line of pull)?",answer:"It follows the center of gravity and runs perpendicular to the earth, representing the force of gravity. Movement directly against this line offers the most resistance."},{id:401,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Biomechanics Recap",question:"What is the moment arm?",answer:"The distance between the line of resistance (line of pull) and the lever's axis of rotation (fulcrum). It determines how much torque the resistance creates on the joint."},{id:402,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Biomechanics Recap",question:"What happens as the moment arm on the working joint increases?",answer:"Torque on the joint increases, so the muscles must generate greater force to overcome it. Larger moment arm = greater force impact on the lever."},{id:403,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Biomechanics Recap",question:"How does upper body biomechanics differ from the lower body?",answer:"The principles are the same, but the arms have far greater freedom of movement. This comes mainly from the shoulder joint and the prevalence of open kinetic chain exercises, so positions can be loaded with many resistance types: dumbbells, cables, elastic bands, and barbells."},{id:404,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Biomechanics Recap",question:"In a push-up, what class of lever is at work?",answer:"A second-class lever: the resistance (bodyweight) sits between the fulcrum (ankle) and the effort (hands/arms). The rule for second-class levers: the closer the load is to the fulcrum, the less effort is required."},{id:405,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Biomechanics Recap",question:"Why does a standard push-up require more effort than an incline push-up?",answer:"The moment arm of the resistance (bodyweight) is larger in the standard push-up. A larger moment arm means a greater impact of the load, so more muscle force is needed to overcome it."},{id:406,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Types of Resistance",question:"For dumbbells (free weights), what direction is the line of pull?",answer:"Perpendicular to the ground, following the direction of gravity. Vertical movement directly against this line offers the most resistance."},{id:407,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Types of Resistance",question:"For cables, what direction is the line of pull?",answer:"Parallel to the cable itself. Movement directly opposing the cable's direction offers the most resistance."},{id:408,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Types of Resistance",question:"What is the relationship between the moment arm and the line of pull?",answer:"The moment arm is always perpendicular to the resistance (line of pull), extending toward the working joint. This holds for both dumbbells and cables. As the moment arm grows, joint torque grows, requiring more internal force."},{id:409,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Types of Resistance",question:"In a dumbbell side raise, where is resistance greatest and why?",answer:"At the very end of the movement. The shoulder is a rotation axis, so the arm travels a circular path. Displacement starts mostly horizontal and becomes increasingly vertical, peaking at the top where movement is most directly against gravity and the moment arm is at its maximum."},{id:410,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Types of Resistance",question:"In a cable side raise, where is resistance greatest and why?",answer:"Midway through the movement, where the moment arm is largest. At the start and end, the arm's direction deviates from the cable's line of pull, which reduces resistance."},{id:411,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Types of Resistance",question:"Why do cables maintain resistance even at rest?",answer:"The weight stack continually exerts a downward force on the cable, keeping constant tension throughout the exercise. Free weights, by contrast, can lose tension when movement isn't opposing gravity."},{id:412,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Types of Resistance",question:"Dumbbell vs. cable side raise: how does the moment arm compare at the end position (90° abduction)?",answer:"The dumbbell's moment arm is larger than the cable's at the end position. As a result, the torque and therefore the resistance on the shoulder is greater in the dumbbell side raise."},{id:413,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Types of Resistance",question:"How does resistance change through a dumbbell side raise vs. a cable side raise?",answer:"Dumbbell: resistance starts low and progressively increases as the arm elevates, emphasizing the latter part of the movement (ascending). Cable: resistance starts high and gradually decreases as the arm rises, emphasizing the initial phase (descending)."},{id:414,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Types of Resistance",question:"What principle summarizes when resistance is greatest?",answer:"Effort (movement) that directly opposes and is aligned with the line of pull provides the greatest resistance. For free weights this is vertical movement; for cables it is movement directly against the cable's direction."},{id:415,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Resistance Curve",question:"What is a resistance curve?",answer:"A description of how resistance changes from the start to the finish of an exercise. It varies significantly between resistance types and exercise variations. No single curve is inherently superior; each is useful in the right context."},{id:416,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Resistance Curve",question:"Name the three types of resistance curves.",answer:"1. Descending: resistance gradually decreases through the movement.\n2. Ascending: resistance progressively increases through the movement.\n3. Bell-shaped: resistance increases, peaks, then gradually decreases."},{id:417,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Resistance Curve",question:"Why isn't resistance constant in isolation exercises?",answer:"Because joints rotate the limbs, movement is rarely purely vertical, horizontal, or diagonal relative to the line of pull. This changing alignment means the moment arm (and therefore resistance) varies across the range of motion."},{id:418,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Strength Applications",question:"Can a single exercise load a muscle maximally throughout the whole movement?",answer:"No. Maintaining maximum resistance across the entire range is not possible with one exercise. By strategically combining exercises with different resistance curves, you can train most of the muscle with optimal resistance."},{id:419,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Strength Applications",question:"In a cable triceps overhead extension, where does resistance peak?",answer:"At the beginning, when the triceps is most stretched (arm extended forward in shoulder flexion, elbow bent). The cable runs from below, so the upward movement opposes it most directly at the start."},{id:420,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Strength Applications",question:"In a triceps kickback, where does resistance peak?",answer:"At the end, when the elbow is fully extended and the triceps is maximally shortened. Resistance builds gradually through the movement, which is why the kickback is less popular on its own."},{id:421,section:"3",chapter:"3.2",chapterName:"Biomechanics",topic:"Strength Applications",question:"Why combine the overhead triceps extension and the kickback?",answer:"They load different phases of the movement (stretched vs. shortened). Because they have opposite resistance curves, combining them covers the muscle's full strength range for well-rounded triceps development."},{id:430,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Scapular Movements",question:"Why is the shoulder girdle more complex than the hip?",answer:"It consists of multiple joints rather than one. The scapula (shoulder blade) is a key component with its own unique movements, described by specific terms (elevation, depression, retraction, protraction, and rotation)."},{id:431,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Scapular Movements",question:"What are elevation and depression of the scapula?",answer:"Elevation = upward movement (pulling the shoulders toward the ears). Depression = downward movement (e.g., shoulder blades pulled down when holding heavy kettlebells)."},{id:432,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Scapular Movements",question:"What are retraction and protraction of the scapula?",answer:"Retraction = the shoulder blades move toward each other (you could hold a pen between them). Protraction = they move apart / outward (as in a plank, creating distance between them)."},{id:433,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Scapular Movements",question:"What are lateral and medial rotation of the scapula?",answer:"Lateral rotation = rotating upward/outward (seen when lifting the arm overhead; the blade moves outward and up with the arm). Medial rotation = rotating downward/inward (when bringing the raised arm back to the body, or the blade lags behind)."},{id:434,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Scapular Movements",question:"What is transverse (horizontal) movement at the shoulder?",answer:"Movement in the transverse plane — horizontal motion. Example: the pectoralis major performs transverse adduction of the shoulder when the arms move horizontally forward."},{id:435,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Shoulder Girdle",question:"What three joints make up the shoulder girdle?",answer:"1. Glenohumeral joint (humerus + scapula). 2. Scapulothoracic joint (scapula + thorax/rib cage). 3. Acromioclavicular (AC) joint (acromion + clavicle) — limited range of motion, not a focus of this course."},{id:436,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Shoulder Girdle",question:"What is the glenohumeral joint and why is it so mobile?",answer:"The junction of the upper arm (humerus) and the shoulder blade's glenoid cavity. The head contacts the socket over only a small area — 'a golf ball on a tee' rather than a ball in a glove. It's the body's most mobile joint, held together by the capsule, labrum, ligaments, tendons, and muscles."},{id:437,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Shoulder Girdle",question:"What makes the scapulothoracic joint unusual?",answer:"It isn't a traditional joint — no head, socket, articulating surfaces, or capsule. The shoulder blade simply glides over the rib cage. The clavicle acts as an anchor, tethering it to the sternum and limiting its range."},{id:438,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Shoulder Girdle",question:"How does the thoracic spine affect shoulder movement?",answer:"It allows about 75° of rotation and 70° of flexion/extension, expanding the scapula's positioning options while the lumbar spine stays stable. Limited upper back mobility can significantly impair shoulder and arm movement."},{id:439,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"How are upper body muscles classified in this chapter?",answer:"By their main role in a movement pattern: significant concentric contribution (movers) or a crucial stabilizing role. Push muscles: pectoralis major/minor, deltoid, triceps brachii. Pull muscles: latissimus dorsi, rhomboids, trapezius, biceps brachii, brachialis. Both patterns actually involve all groups."},{id:440,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What is the function of the pectoralis major (upper body chapter)?",answer:"Transverse and normal adduction of the shoulder, flexion (upper fibers) and extension (lower fibers) of the shoulder, and internal rotation of the shoulder. A primary pushing muscle."},{id:441,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What is the function of the pectoralis minor?",answer:"Acts on the scapula: depression, medial rotation, and protraction of the shoulder blade. Overactivity contributes to undesired scapular rhythms."},{id:442,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What are the functions of the three heads of the deltoid?",answer:"Anterior (clavicular) head: shoulder flexion, transverse adduction, internal rotation. Middle (acromial) head: shoulder abduction. Posterior (spinal) head: shoulder extension (weak), transverse abduction, external rotation."},{id:443,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What is the function of the triceps brachii (upper body chapter)?",answer:"Extension of the elbow (all heads), plus adduction and extension of the shoulder from the long head. A key pushing muscle."},{id:444,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What are the four rotator cuff muscles and their functions?",answer:"Supraspinatus: shoulder abduction + stabilizes the humeral head. Infraspinatus: external rotation + stabilizes. Teres minor: external rotation, adduction + stabilizes. Subscapularis: internal rotation + stabilizes. All keep the humeral head centered in the glenoid cavity."},{id:445,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What is the function of the teres major?",answer:"Shoulder extension, adduction, and internal rotation of the shoulder. Works alongside the lats and rotator cuff around the shoulder."},{id:446,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What is the function of the serratus anterior?",answer:"Pulls the scapula against the thorax, produces lateral rotation and protraction of the scapula, and its upper fibers assist medial rotation. Essential for keeping the blade flat against the rib cage."},{id:447,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What is the function of the latissimus dorsi (upper body chapter)?",answer:"Shoulder extension, shoulder adduction, and internal rotation of the shoulder. A primary pulling muscle."},{id:448,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What is the function of the rhomboids (minor and major)?",answer:"Retraction of the scapula and assistance with its medial rotation. They draw the shoulder blades toward the spine during pulling."},{id:449,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What are the functions of the three parts of the trapezius?",answer:"Descending (upper) fibers: assist scapular elevation and lateral rotation, neck flexion/rotation, and retraction. Transverse (middle) fibers: scapular retraction. Ascending (lower) fibers: scapular depression, assist lateral rotation and retraction."},{id:450,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Push & Pull Muscles",question:"What are the functions of the biceps brachii and brachialis?",answer:"Biceps brachii: elbow flexion, forearm supination, and shoulder flexion. Brachialis: elbow flexion (especially with the forearm pronated) — an extremely strong elbow flexor."},{id:451,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Scapulohumeral Rhythm",question:"What is scapulohumeral rhythm?",answer:"The coordinated movement of the upper arm (humerus), shoulder blade (scapula), and thoracic spine. Proper rhythm keeps the scapula in maximum contact with the thorax and the humeral head firmly in the glenoid cavity, ensuring strength and stability."},{id:452,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Scapulohumeral Rhythm",question:"What is the scapular rhythm when raising the arm to shoulder height (up to 70–90°)?",answer:"The scapula stays neutral to slightly laterally rotated and the thoracic spine stays neutral. Example: a dumbbell front or side raise."},{id:453,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Scapulohumeral Rhythm",question:"What is the scapular rhythm when raising the arm above the head (past 70–90°)?",answer:"The scapula laterally rotates, slightly elevates, and posteriorly tilts; the thoracic spine extends (or ipsilaterally rotates in unilateral work). Example: an overhead press."},{id:454,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Scapulohumeral Rhythm",question:"What is the scapular rhythm when reaching forward or pushing away?",answer:"The scapula protracts, internally rotates, and anteriorly tilts; the thoracic spine flexes (or contralaterally rotates in unilateral work). Example: the shoulder blade position in a plank or push-up."},{id:455,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Scapulohumeral Rhythm",question:"What is the scapular rhythm when bringing the arm back to the body (adduction) vs. behind the body (a row)?",answer:"Bringing a raised arm back down (lat pulldown): scapula medially rotates, thoracic spine neutral to extension. Bringing the arm behind the body (row): scapula retracts and externally rotates, thoracic spine extends."},{id:456,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Undesired Rhythms",question:"What is translation (gliding) of the humeral head?",answer:"A movement where the humeral head shifts position within the joint without rotating. It's essential for healthy shoulder function and often needed to create space and prevent impingement."},{id:457,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Undesired Rhythms",question:"Which translations accompany abduction, flexion, and extension?",answer:"Abduction → inferior glide (head moves down in the socket). Flexion → posterior glide (head moves backward). Extension → anterior glide (head moves forward)."},{id:458,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Undesired Rhythms",question:"What is impingement?",answer:"When tissue becomes trapped between the humeral head and another structure, such as the socket. The client feels restricted, constricted movement as they approach an end position. Adequate translation can create space and help prevent it."},{id:459,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Undesired Rhythms",question:"What is anterior humeral glide?",answer:"Excessive forward gliding of the humeral head when the arm moves behind the body (transverse abduction/extension). Over time it can irritate the anterior capsule or biceps tendon. Recognizable by a prominent humeral head at the front, driven by overactive lats, biceps, pec minor, and levator scapulae."},{id:460,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Undesired Rhythms",question:"What is scapular dyskinesis?",answer:"An abnormal change in the position or movement of the shoulder blade — a disrupted scapulohumeral rhythm. The two undesirable patterns covered are excessive elevation, and winging or tipping."},{id:461,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Undesired Rhythms",question:"When is scapular elevation a problem?",answer:"Some elevation is normal (blades lift slightly when retracting or rotating overhead). It becomes undesirable when excessive — usually from overactive levator scapulae or upper trapezius fibers — disrupting the blade's rhythm or working against the intended movement."},{id:462,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Undesired Rhythms",question:"What are winging and tipping of the scapula?",answer:"Both are the shoulder blade lifting off the rib cage. Tipping = excessive anterior tilt, lifting off at the bottom (inferior edge). Winging = excessive internal rotation, lifting off at the inner (medial) edge. Both create an unstable scapular position."},{id:463,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Undesired Rhythms",question:"How do you coach tipping (inferior edge lifting off)?",answer:"Underactive: middle and lower trapezius. Overactive: pec minor, levator scapulae, and to a lesser extent the rhomboids (excessive medial rotation). Coach the client to position the shoulder blades back and down in a pull pattern to engage the middle and lower trapezius for scapular stabilization."},{id:464,section:"3",chapter:"3.3",chapterName:"Anatomy Upper Body",topic:"Undesired Rhythms",question:"How do you coach winging (medial edge lifting off)?",answer:"Underactive: serratus anterior, trapezius, possibly rhomboids. Overactive: pec minor, posterior deltoid, infraspinatus, or teres minor (excessive internal rotation). Coach push patterns with blades apart and low to activate the serratus anterior; coach pull patterns with blades down and back to engage the middle and lower trapezius."},{id:470,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"External Focus",question:"Why does the Milo method coach with external references?",answer:"Research (Wulf, 2013) shows an external, implicit focus improves output across all key parameters. It boosts both effectiveness (accuracy, consistency, balance) and efficiency (muscle activity, force production, cardiovascular performance) compared with an internal, explicit focus."},{id:471,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"External Focus",question:"What is the difference between internal and external focus?",answer:"Internal focus directs attention to the body movements causing an effect (e.g., 'engage your glutes'). External focus directs attention to the effect of the movement (e.g., 'push the ground away')."},{id:472,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"External Focus",question:"What is the difference between explicit and implicit instruction?",answer:"Explicit instruction precisely explains the execution (e.g., 'bend your elbow and contract your biceps'). Implicit instruction shares the knowledge without directly stating what to do (e.g., 'imagine you're squeezing an orange under your armpit')."},{id:473,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"External Focus",question:"Which focus combination generally produces the best motor performance?",answer:"An external + implicit focus. Attention on the effect of the movement, guided without directly naming what the body should do."},{id:474,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"External Focus",question:"Why do trainers naturally default to an internal focus?",answer:"When observing a client, you analyze the movement and break it into sub-movements. Communicating what you see directly during the movement steers the client toward an internal focus, because you're speaking from your own frame of reference."},{id:475,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"External Focus",question:"What is the trainer's challenge when giving cues?",answer:"To maintain an external focus: find a cue that elicits the desired movement without explicitly telling the client what to do with their body — translating the action into external terms. It requires empathy, practice, and experience, and is why steps two and three of the coaching cycle are kept distinct."},{id:476,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"External Focus",question:"Why are external cues more effective than internal cues?",answer:"They offer greater specificity and clarity; research confirms they improve movement patterns and performance; they provide stronger motivation through direct relation to the task; and they adapt better to different situations and exercises than rigid internal cues."},{id:477,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"Coaching Interventions",question:"What three types of coaching cues can be used to teach movement?",answer:"Visual, verbal/auditory (imagery), and kinesthetic. Each allows extensive use of external references, such as referring to the space around you or using your hands to guide direction."},{id:478,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"Coaching Interventions",question:"Give examples of visual coaching interventions.",answer:"Demonstrate a movement (e.g., biceps rotating outward); show correct vs. faulty variations (neutral upper back and shoulder blades vs. a 'dumped' shoulder with the upper back flexed and blades protracted); and use video feedback recorded from multiple angles (side, front, back)."},{id:479,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"Coaching Interventions",question:"Give examples of verbal cues (imagery).",answer:"'Drive the bar toward the ceiling,' 'push the ground away,' 'imagine snapping the bar in half,' 'squeeze your shoulder blades as if holding a pencil between them,' 'picture your lower body in cement up to your ribs,' and the tightrope-to-train-tracks cue for setting stance width."},{id:480,section:"3",chapter:"3.4",chapterName:"Coaching",topic:"Coaching Interventions",question:"Give examples of kinesthetic coaching interventions.",answer:"Place your hand on the client's shoulder blade and guide it in the desired direction; use your hand as a target ('wrap your shoulder blades around my hand'); and provide resistance on the bar to help the client find the optimal position."},{id:500,section:"3",chapter:"3.5",chapterName:"Horizontal Push & Pull",topic:"Horizontal Patterns",question:"What scapular movements dominate horizontal push and pull patterns?",answer:"Protraction and retraction. The arm's position typically doesn't exceed about 90 degrees of flexion. Pushing moves the scapula toward protraction; pulling moves it toward retraction."},{id:501,section:"3",chapter:"3.5",chapterName:"Horizontal Push & Pull",topic:"Horizontal Patterns",question:"How does the upper back move with the scapula in horizontal patterns?",answer:"Scapular retraction requires upper back extension; scapular protraction goes with upper back flexion/rounding. Some exercises like the bench press keep a more fixed scapular position and a stable upper back."},{id:502,section:"3",chapter:"3.5",chapterName:"Horizontal Push & Pull",topic:"Horizontal Patterns",question:"In a horizontal PUSH, what is the arm movement and which muscles are active?",answer:"The upper arm moves from back to front — flexion, transverse adduction, or both. Active muscles: pectoralis major, anterior deltoid, and triceps brachii (over the elbow). The scapula moves toward protraction and the upper back flexes."},{id:503,section:"3",chapter:"3.5",chapterName:"Horizontal Push & Pull",topic:"Horizontal Patterns",question:"In a horizontal PULL, what is the arm movement and which muscles are active?",answer:"The upper arm moves from front to back — extension, transverse abduction/adduction, or a combination. Active muscles: latissimus dorsi, teres major, rear deltoid, and biceps brachii & brachialis (over the elbow). The scapula moves toward retraction and the upper back extends."},{id:504,section:"3",chapter:"3.5",chapterName:"Horizontal Push & Pull",topic:"Horizontal Patterns",question:"What are the common energy leaks in horizontal push and pull?",answer:"Internal rotation of the shoulder (pressure on the front of the shoulder); anterior humeral glide; elevation, winging, or tipping of the scapula; and mismatched upper back movement (flexing when retraction is needed, or extending when full protraction is needed)."},{id:505,section:"3",chapter:"3.5.1",chapterName:"Horizontal Push",topic:"Horizontal Push",question:"What is the progression-sequence principle for upper body exercises?",answer:"Move from constrained to free and simple to complex, developed from semi-vertical (high-to-low) toward horizontal or vertical. Semi-vertical and incline setups create a constrained environment that forces the scapula toward the desired retraction and depression."},{id:506,section:"3",chapter:"3.5.1",chapterName:"Horizontal Push",topic:"Horizontal Push",question:"Why begin upper body progressions semi-vertical (high-to-low)?",answer:"Most people elevate the scapula easily but find protraction, retraction, and rotation harder. A high-to-low motion naturally guides the desired pattern. Also, the more vertical/overhead the work, the more upper back extension mobility it demands — which not all clients have."},{id:507,section:"3",chapter:"3.5.1",chapterName:"Horizontal Push",topic:"Horizontal Push",question:"Why can unilateral upper body exercises help clients with limited mobility?",answer:"They allow rotation while extending, distributing the range of motion across multiple planes. This requires less upper back extension than bilateral exercises for the same shoulder range of motion."},{id:508,section:"3",chapter:"3.5.1",chapterName:"Horizontal Push",topic:"Horizontal Push",question:"What is the key difference between a push-up and a bench press?",answer:"In the push-up the body moves and the scapula must protract at the top while keeping a neutral lower back. In the bench press the body is fixed on the bench, the scapulae stay retracted and depressed (no protraction), forming a stable platform — and leg drive adds stability."},{id:509,section:"3",chapter:"3.5.1",chapterName:"Horizontal Push",topic:"Horizontal Push",question:"What are the three common energy leaks in push-ups?",answer:"Lumbar hyperextension (concentric phase), shoulder dump (eccentric phase), and elbow flaring (either phase)."},{id:510,section:"3",chapter:"3.5.1",chapterName:"Horizontal Push",topic:"Horizontal Push",question:"What is the push-up progression sequence?",answer:"1. Plank (a push-up is a 'moving plank'). 2. Incline push-up. 3. Push-up. 4. Variations: parallette, ring, band-resisted, and weighted push-ups (for range of motion, stability, or added resistance)."},{id:511,section:"3",chapter:"3.5.1",chapterName:"Horizontal Push",topic:"Horizontal Push",question:"What is 'leg drive' in the bench press?",answer:"Generating force from the legs and heels to stay firmly on the bench, maximizing stability from the heels all the way to the shoulder blades so you can press powerfully and efficiently."},{id:512,section:"3",chapter:"3.5.1",chapterName:"Horizontal Push",topic:"Horizontal Push",question:"What are the three additional bench press energy leaks (beyond the three shared with push-ups)?",answer:"Feet lifting off the ground (insufficient leg drive), buttocks lifting off the bench (pushing upward instead of backward), and lifting the head (neck and thoracic flexion). The shared three are hyperextension, shoulder dump, and flaring elbows."},{id:513,section:"3",chapter:"3.5.1",chapterName:"Horizontal Push",topic:"Horizontal Push",question:"How does elbow position change the focus of the bench press?",answer:"Elbows far from the body emphasize transverse adduction; elbows close to the body emphasize shoulder flexion."},{id:514,section:"3",chapter:"3.5.2",chapterName:"Horizontal Pull",topic:"Horizontal Pull",question:"What is the coaching focus of the horizontal pull?",answer:"Retraction and protraction of the shoulder blades. The lower back stays neutral while the upper back moves from neutral/flexion to extension."},{id:515,section:"3",chapter:"3.5.2",chapterName:"Horizontal Pull",topic:"Horizontal Pull",question:"What are the start and end scapular positions in a row?",answer:"Start: protraction without elevation — a slight stretch between the shoulder blades, no neck tension. End: retraction and depression ('back and inward'), with the upper back moving into extension."},{id:516,section:"3",chapter:"3.5.2",chapterName:"Horizontal Pull",topic:"Horizontal Pull",question:"What are the three common energy leaks in the row?",answer:"Lumbar hyperextension, shoulder dump (shoulders coming forward at the end), and elevation of the shoulder blade (shoulders shooting up toward the ears)."},{id:517,section:"3",chapter:"3.5.2",chapterName:"Horizontal Pull",topic:"Horizontal Pull",question:"What is the row progression sequence?",answer:"From constrained to free: 1. High-to-low row (encourages depression and retraction). 2. Single-arm DB row. 3. Incline chest-supported DB row. 4. Seated row (whole back moves freely, bilateral)."},{id:518,section:"3",chapter:"3.5.2",chapterName:"Horizontal Pull",topic:"Horizontal Pull",question:"Single-arm DB row: elbows in vs. elbows out — what changes?",answer:"Elbows in emphasizes the lats through shoulder extension. Elbows out shifts the arm to transverse abduction, reducing the lats' contribution and increasing the workload on the upper back."},{id:519,section:"3",chapter:"3.5.2",chapterName:"Horizontal Pull",topic:"Horizontal Pull",question:"Why is the 'armpit angle' important in rows?",answer:"It reflects how horizontal or vertical the pull is. The higher the shoulder relative to the hip, the smaller the armpit angle. Focusing on armpit angle and elbow position (closer to or farther from the body) is how you distinguish horizontal from semi-horizontal pulls."},{id:520,section:"3",chapter:"3.6",chapterName:"Vertical Push & Pull",topic:"Vertical Patterns",question:"What scapular movement dominates vertical patterns, and why?",answer:"Lateral and medial rotation (instead of protraction/retraction). Lateral rotation lifts the acromion — the shoulder's 'roof' — so the humeral head doesn't hit it. The scapula also posteriorly tilts to create space at the front."},{id:521,section:"3",chapter:"3.6",chapterName:"Vertical Push & Pull",topic:"Vertical Patterns",question:"Why do vertical patterns demand more upper back mobility?",answer:"The more vertical/overhead the movement, the more upper back extension is required to allow the scapula to laterally rotate. Limited thoracic extension restricts overhead work, so semi-vertical variations suit less mobile clients."},{id:522,section:"3",chapter:"3.6",chapterName:"Vertical Push & Pull",topic:"Vertical Patterns",question:"Vertical PUSH: arm movement, active muscles, and main energy leak?",answer:"The arm moves from beside the body to overhead (flexion and/or abduction). Active: middle and anterior deltoid, pectoralis major, triceps (over elbow), trapezius, and serratus anterior. Main leak: staying in internal rotation — the shoulder must slightly externally rotate to avoid impingement; insufficient upper back extension causes lumbar hyperextension."},{id:523,section:"3",chapter:"3.6",chapterName:"Vertical Push & Pull",topic:"Vertical Patterns",question:"Vertical PULL: arm movement, active muscles, and scapular movement?",answer:"The arm moves from overhead down to beside the body (extension and/or adduction). Active: latissimus dorsi, teres major, biceps & brachialis (over elbow), trapezius, and rhomboids. The scapula transitions from lateral rotation to medial rotation."},{id:524,section:"3",chapter:"3.6.1",chapterName:"Vertical Push",topic:"Vertical Push",question:"How does the scapula move through a vertical push (start to end)?",answer:"Start neutral and depressed — flush against the ribcage, back and down. End in lateral rotation with slight elevation. During the concentric phase the arm and hand travel upward in a semicircle."},{id:525,section:"3",chapter:"3.6.1",chapterName:"Vertical Push",topic:"Vertical Push",question:"What is the 'scapular plane' and why do most people press there?",answer:"A position where the elbow is between flexion and abduction. Full abduction overhead demands significant mobility, so most people find their strongest overhead press in the scapular plane."},{id:526,section:"3",chapter:"3.6.1",chapterName:"Vertical Push",topic:"Vertical Push",question:"What are the most common energy leaks in the vertical push?",answer:"Lumbar hyperextension, shoulder blade elevation, lateral flexion of the torso, wrist not above the elbow, and elbow/wrist misaligned with the shoulder at the end position."},{id:527,section:"3",chapter:"3.6.1",chapterName:"Vertical Push",topic:"Vertical Push",question:"What is the vertical push progression sequence?",answer:"From semi-vertical to fully vertical, and unilateral to bilateral: 1. Standing landmine press. 2. Half-kneeling landmine press. 3. Half-kneeling DB overhead press. 4. Standing DB press. 5. Standing barbell overhead (military) press. Bilateral presses demand the most mobility and thoracic extension."},{id:528,section:"3",chapter:"3.6.1",chapterName:"Vertical Push",topic:"Vertical Push",question:"How does moving from a standing to a half-kneeling landmine press change the demands?",answer:"The armpit angle widens, making the movement more vertical. This increases lateral rotation and decreases protraction of the scapula, and the higher bar position demands more upper back extension. The load's moment arm also lengthens, intensifying resistance."},{id:529,section:"3",chapter:"3.6.2",chapterName:"Vertical Pull",topic:"Vertical Pull",question:"What are the two crucial points of the vertical pull?",answer:"1. Move the scapula from a laterally rotated position into medial rotation, retraction, and depression ('back and down'). 2. At the end, the upper back is extended and the shoulder is externally rotated."},{id:530,section:"3",chapter:"3.6.2",chapterName:"Vertical Pull",topic:"Vertical Pull",question:"What is the most common energy leak in vertical pulling, and the fix?",answer:"Shoulder dump: the arm/elbow initiates the pull with little scapular engagement. The scapula should move first (back and down), then the elbow flexes. Teaching scapula-first movement is the key."},{id:531,section:"3",chapter:"3.6.2",chapterName:"Vertical Pull",topic:"Vertical Pull",question:"What are the three energy leaks in the vertical pull?",answer:"Shoulder dump, lumbar hyperextension, and the forearm ending horizontal instead of vertical at the end position (elbow going back instead of down)."},{id:532,section:"3",chapter:"3.6.2",chapterName:"Vertical Pull",topic:"Vertical Pull",question:"Supinated vs. pronated lat pulldown — what's the difference?",answer:"Supinated (underhand, narrow, chin-up grip): palms face you, the arm moves in extension, training the lat in that function. Pronated (overhand, wide, pull-up grip): palms face away, the arm moves primarily in adduction, training the lat in that function."},{id:533,section:"3",chapter:"3.6.2",chapterName:"Vertical Pull",topic:"Vertical Pull",question:"What is the vertical pull progression sequence?",answer:"Single-arm cable pulldown → supinated or pronated lat pulldown → chin-up. Teach scapula-first movement in three phases: scapula pulldowns, then a two-step (blades back and down, then elbow to hip), then one fluid motion."},{id:534,section:"3",chapter:"3.6.2",chapterName:"Vertical Pull",topic:"Vertical Pull",question:"What is the difference between a chin-up and a pull-up?",answer:"Chin-up: supinated (underhand) grip with elbows tucked. Pull-up: elbows point outward, a harder position for the lats and biceps to generate force and more demanding on the upper back to hold the scapula and arm position."},{id:535,section:"3",chapter:"3.6.2",chapterName:"Vertical Pull",topic:"Vertical Pull",question:"When should you avoid starting chin-ups too early, and what are the progression options?",answer:"Avoid for significantly overweight clients (very high strength buy-in) and clients whose vertical pulling rhythm is far from ideal (rhythm is hard to coach mid-chin-up). Progression options: assisted pull-up machine, band-assisted chin-up (horizontal band preferred), and eccentric-only chin-ups."},{id:600,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"How is stress defined (Sarafino & Smith)?",answer:"A circumstance, real or perceived, in which a person observes a discrepancy between the physical or psychological demands of a situation and the resources of their biological, psychological, or social system. It can be analyzed as both an experience and a physiological event."},{id:601,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"What are catabolic and anabolic processes, and which nervous system controls each?",answer:"Catabolic = breaking-down processes that release immediately available energy, driven by the sympathetic nervous system (fight/flight). Anabolic = building and recovery processes, driven by the parasympathetic nervous system (rest/digest). The body constantly does both, even at rest."},{id:602,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"What is homeostasis?",answer:"The biological principle whereby the body continuously strives to maintain a stable internal environment (temperature, blood pressure, blood sugar, acidity) within narrow limits, despite changes in external conditions."},{id:603,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"What is a setpoint?",answer:"The natural level of physical performance or body composition to which the body adapts. After a strong stressor with sufficient recovery, the body can settle at a new, higher setpoint."},{id:604,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"Why is a completely stress-free life undesirable?",answer:"Without stressors the body slowly weakens: muscle mass, bone density, oxygen uptake, and brain capacity all decrease. Stress is an essential part of life, provided there are enough resources to recover and maintain homeostasis."},{id:605,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"What is a stressor versus stress perception?",answer:"A stressor is the stimulus itself. Stress perception is the individual's perception of that stressor. Stress arises from the duration and intensity of the stressor, amplified or weakened by stress perception, making it highly situational."},{id:606,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"What is the G.A.S. model and who created it?",answer:"The General Adaptation Syndrome, introduced by Hans Selye (first published 1936). It shows how stressors disrupt homeostasis in three phases, with the body responding the same way to different forms of stress. Repeated exposure to a stressor produces adaptation."},{id:607,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"What are the three phases of the G.A.S. model?",answer:"1. Alarm phase. 2. Resistance phase. 3. Exhaustion phase."},{id:608,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"What happens in the alarm phase?",answer:"Homeostasis is disrupted and the body makes resources available via a fight/flight/freeze response (raised heart rate, breathing, glucose release, muscle tension). A fast wave comes through the sympathetic system (adrenaline/noradrenaline) and a slower wave through the HPA axis (cortisol). The immune system is temporarily weakened."},{id:609,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"What is the HPA axis?",answer:"The hypothalamic-pituitary-adrenal axis — the slower hormonal branch of the stress response (hypothalamus → pituitary → adrenal cortex). It produces corticosteroids, including cortisol, the stress hormone."},{id:610,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"What happens in the resistance phase?",answer:"If the stressor persists, the body keeps releasing extra energy (steady or intense); you're highly alert and focused. The affective (emotional) reaction is processed in the brain, and the strong emotional response helps you remember the cause — the brain is literally restructured by stress."},{id:611,section:"4",chapter:"4.2.1",chapterName:"Everything is Stress",topic:"Stress & GAS Model",question:"What happens in the exhaustion phase?",answer:"The final phase, in which the extra energy is depleted and the body can no longer resist the stressor because its resources are exhausted. It's important to escape or remove the stressor before this point to prevent illness or irreparable damage."},{id:612,section:"4",chapter:"4.2.2",chapterName:"How the Body Changes",topic:"Adaptation & Training Principles",question:"What is the difference between morphological and neurological adaptations?",answer:"Morphological = changes in the body's tissues (muscle growth/hypertrophy, fat loss, stronger bones and tendons) — changes in the body's 'shape'. Neurological = changes in the nervous system's efficiency and effectiveness (motor skills, a higher 1RM, translating coaching into execution)."},{id:613,section:"4",chapter:"4.2.2",chapterName:"How the Body Changes",topic:"Adaptation & Training Principles",question:"What do both adaptation types require, and how do they differ?",answer:"Both require a cycle of resistance, fatigue, and recovery (anabolic recovery in the parasympathetic system). Morphological adaptations need more building blocks (nutrition) and prolonged, heavy fatigue — duration matters. Neurological adaptations depend on quality of performance rather than fatigue itself. Both compete for the same resources."},{id:614,section:"4",chapter:"4.2.2",chapterName:"How the Body Changes",topic:"Adaptation & Training Principles",question:"What are the four phases of the training process?",answer:"1. Stress disrupts homeostasis. 2. A signal is sent that adaptation is required. 3. Genetic route. 4. Restructuring and adapting."},{id:615,section:"4",chapter:"4.2.2",chapterName:"How the Body Changes",topic:"Adaptation & Training Principles",question:"What is a threshold and an overload stimulus?",answer:"Threshold = the minimum level of fatigue that must be reached to enable adaptation. Overload stimulus = a stimulus strong and long enough in duration and intensity to break through that threshold and elicit an anabolic response — 'heavier than normal'."},{id:616,section:"4",chapter:"4.2.2",chapterName:"How the Body Changes",topic:"Adaptation & Training Principles",question:"What does the 'genetic route' phase mean for a trainer?",answer:"Individuals adapt differently to the same stressor because of DNA. DNA helps performance through favorable physical/mental composition and through interaction with the environment (challenge is needed to realize potential). Trainers must individualize programs and follow each client's own speed of adaptation."},{id:617,section:"4",chapter:"4.2.2",chapterName:"How the Body Changes",topic:"Adaptation & Training Principles",question:"What is supercompensation?",answer:"When the right amount of a specific stressor causes specific fatigue, followed by recovery and adaptation, so the body strengthens beyond its original setpoint and handles future stress better. If the stimulus decreases, the body returns to its original setpoint."},{id:618,section:"4",chapter:"4.2.2",chapterName:"How the Body Changes",topic:"Adaptation & Training Principles",question:"How does overload differ from fatigue?",answer:"Overload is a stimulus long and/or strong enough to trigger a powerful anabolic reaction and, with enough recovery, supercompensation. Fatigue alone doesn't guarantee it — fatigue of insufficient duration/intensity, or poor recovery, won't produce supercompensation."},{id:619,section:"4",chapter:"4.2.2",chapterName:"How the Body Changes",topic:"Adaptation & Training Principles",question:"What is progressive overload, and how does it differ from progression?",answer:"As the setpoint rises, the stimulus must be increased or adjusted over time (via intensity, volume, frequency, or duration) to stay effective. Progressive overload is the deliberate choice the trainer makes; progression (getting stronger, more reps) is the resulting outcome."},{id:620,section:"4",chapter:"4.2.2",chapterName:"How the Body Changes",topic:"Adaptation & Training Principles",question:"What is the SAID principle?",answer:"Specific Adaptation to Imposed Demand: only what you fatigue or exhaust will change. The more specific the fatiguing stimulus, the more targeted the body's deployment of resources and the resulting supercompensation."},{id:621,section:"4",chapter:"4.2.3",chapterName:"Lifestyle & Training",topic:"Lifestyle & Fatigue",question:"What is the fitness-fatigue model?",answer:"A model of the relationship between fatigue, recovery, and adaptation. Fitness is your potential — the performance you could deliver with no fatigue. Actual performance = fitness minus fatigue. Notably, potential performance rises before fatigue has fully disappeared."},{id:622,section:"4",chapter:"4.2.3",chapterName:"Lifestyle & Training",topic:"Lifestyle & Fatigue",question:"What is fatigue, and in which two areas can it occur?",answer:"Fatigue is a state of increased sensitivity to stress and decreased performance. It occurs in two areas: central (the central nervous system — brain and spinal cord) and peripheral (the peripheral nervous system — the neuromuscular junction and metabolic/biochemical changes within the muscle)."},{id:623,section:"4",chapter:"4.2.3",chapterName:"Lifestyle & Training",topic:"Lifestyle & Fatigue",question:"What is central fatigue and how quickly does it recover?",answer:"An inadequate drive of motor output (mostly in the brain) that reduces performance or stops activity. It occurs mainly during long-duration efforts with a large metabolic component, not short intense ones — and it recovers within about 10-20 minutes after resistance training."},{id:624,section:"4",chapter:"4.2.3",chapterName:"Lifestyle & Training",topic:"Lifestyle & Fatigue",question:"What is peripheral fatigue?",answer:"A reduction in the effectiveness of the neuromuscular junction plus metabolic and biochemical changes within the muscle (metabolic fatigue and muscle damage). Muscle damage can persist a long time — up to 24 hours after an intense session — impairing muscle activation and performance."},{id:625,section:"4",chapter:"4.2.3",chapterName:"Lifestyle & Training",topic:"Lifestyle & Fatigue",question:"Which type of fatigue mainly hinders performance?",answer:"Peripheral, not central. Physical fatigue is primarily peripheral (metabolic fatigue and muscle damage), while central fatigue is short-lived. The CNS can even become more active as peripheral fatigue increases."},{id:626,section:"4",chapter:"4.2.3",chapterName:"Lifestyle & Training",topic:"Lifestyle & Fatigue",question:"Why does muscle activation drop with muscle damage or metabolic fatigue?",answer:"The muscle spindles and Golgi tendon organs send altered information to the brain, reducing muscle activation. This is protective — it stops you heavily loading a muscle that can't handle the stress, lowering injury risk (though it also reduces coordination and performance)."},{id:627,section:"4",chapter:"4.2.3",chapterName:"Lifestyle & Training",topic:"Lifestyle & Fatigue",question:"How does perception of fatigue affect performance?",answer:"Because training is voluntary muscle contraction, your perceived physical state shapes your confidence and the effort you'll exert. Fight-or-flight lowers perceived fatigue and raises performance; too little sleep lowers confidence and muscle activation without a direct physiological deficiency. The brain is largely influenced by perception, which motivation can shift."},{id:628,section:"4",chapter:"4.2.3",chapterName:"Lifestyle & Training",topic:"Lifestyle & Fatigue",question:"How does chronic life stress limit morphological adaptation?",answer:"High stress keeps people in a sympathetic state longer and more often, so anabolic processes are less active. They eat and digest less, and sleep less and worse, giving recovery processes less time to work — limiting tissue building. The result can be no supercompensation, or reduced capacity for the next session."},{id:629,section:"4",chapter:"4.2.3",chapterName:"Lifestyle & Training",topic:"Lifestyle & Fatigue",question:"What is the difference between training and performing, regarding lifestyle?",answer:"Performing is a snapshot — with the right mindset you can push to your limits even without sleep or food. But training hard only sets adaptation in motion; the yield depends on anabolic recovery afterward (local repair of muscle, bone, and tendon). Training hard while under-recovered does not guarantee results."},{id:630,section:"4",chapter:"4.2.3",chapterName:"Lifestyle & Training",topic:"Lifestyle & Fatigue",question:"When does lifestyle (sleep, nutrition, recovery) matter most for a client?",answer:"The more intense the stimulus, the more it matters. Occasional poor sleep or nutrition is fine if the client believes in their ability, but as training advances and progressive overload demands stronger stimuli, recovery becomes a limiting factor. This is why top athletes only eat, train, and sleep — for beginners it isn't yet critical."},{id:300,section:"muscles",chapter:"Muscles",chapterName:"Chest & Shoulders",topic:"Chest & Shoulders",question:"What is the function of the pectoralis major?",answer:"The large fan-shaped chest muscle. It produces horizontal adduction (bringing the arm across the body), shoulder flexion, and internal rotation of the upper arm. Prime mover in the bench press, push-up, and any pressing or pushing action in sport."},{id:301,section:"muscles",chapter:"Muscles",chapterName:"Chest & Shoulders",topic:"Chest & Shoulders",question:"What is the function of the pectoralis minor?",answer:"A small muscle beneath the pec major. It protracts, depresses, and downwardly rotates the scapula, and helps stabilize the shoulder blade against the rib cage. Tightness here is a common cause of rounded-shoulder posture."},{id:302,section:"muscles",chapter:"Muscles",chapterName:"Chest & Shoulders",topic:"Chest & Shoulders",question:"What is the function of the anterior (front) deltoid?",answer:"Shoulder flexion (raising the arm to the front) and internal rotation. Heavily involved in overhead and front pressing, front raises, and any throwing or punching action."},{id:303,section:"muscles",chapter:"Muscles",chapterName:"Chest & Shoulders",topic:"Chest & Shoulders",question:"What is the function of the lateral (middle) deltoid?",answer:"Shoulder abduction — lifting the arm out to the side. The main mover in lateral raises and a key contributor to overhead pressing. Gives the shoulder its rounded, capped width."},{id:304,section:"muscles",chapter:"Muscles",chapterName:"Chest & Shoulders",topic:"Chest & Shoulders",question:"What is the function of the posterior (rear) deltoid?",answer:"Shoulder extension, horizontal abduction (pulling the arm back), and external rotation. Trained in rows, reverse flyes, and face pulls. Important for shoulder balance and posture."},{id:305,section:"muscles",chapter:"Muscles",chapterName:"Chest & Shoulders",topic:"Chest & Shoulders",question:"What is the function of the rotator cuff?",answer:"A group of four deep muscles (supraspinatus, infraspinatus, teres minor, subscapularis) that rotate the upper arm and, most importantly, hold the head of the humerus centered in the shoulder socket. Critical for shoulder stability in throwing, pressing, and overhead sports."},{id:306,section:"muscles",chapter:"Muscles",chapterName:"Chest & Shoulders",topic:"Chest & Shoulders",question:"What is the function of the serratus anterior?",answer:"Protracts the scapula (pulls it forward around the rib cage) and upwardly rotates it, allowing the arm to reach fully overhead. Often called the 'boxer's muscle' for its role in punching and pushing. Key for healthy overhead pressing."},{id:307,section:"muscles",chapter:"Muscles",chapterName:"Back",topic:"Back",question:"What is the function of the latissimus dorsi?",answer:"The large 'wing' muscle of the back. It produces shoulder extension, adduction (pulling the arm down to the side), and internal rotation. Prime mover in pull-ups, lat pulldowns, and rows; also a powerful contributor to pulling and swimming."},{id:308,section:"muscles",chapter:"Muscles",chapterName:"Back",topic:"Back",question:"What is the function of the upper trapezius?",answer:"Elevates the scapula (shrugging) and helps extend and rotate the neck. Active in shrugs, deadlift lockout, and carrying loads. Stabilizes the shoulder girdle under heavy overhead and pulling work."},{id:309,section:"muscles",chapter:"Muscles",chapterName:"Back",topic:"Back",question:"What is the function of the middle and lower trapezius?",answer:"The middle traps retract the scapula (pull the shoulder blades together); the lower traps depress and upwardly rotate it. Together they stabilize the scapula during pulling and pressing and are essential for good posture."},{id:310,section:"muscles",chapter:"Muscles",chapterName:"Back",topic:"Back",question:"What is the function of the rhomboids?",answer:"Retract the scapula (squeeze the shoulder blades together) and downwardly rotate it. Work alongside the middle traps in rows and any pulling movement, and help hold the shoulders back against rounding."},{id:311,section:"muscles",chapter:"Muscles",chapterName:"Back",topic:"Back",question:"What is the function of the teres major?",answer:"A small muscle below teres minor, often called the 'lat's little helper.' It assists shoulder extension, adduction, and internal rotation, working with the lats in pulling movements."},{id:312,section:"muscles",chapter:"Muscles",chapterName:"Back",topic:"Back",question:"What is the function of the erector spinae?",answer:"A group of muscles running either side of the spine. Bilaterally they extend (straighten) the spine; unilaterally they side-bend and rotate it. They keep the torso rigid and upright under load in deadlifts, squats, and almost every athletic position."},{id:313,section:"muscles",chapter:"Muscles",chapterName:"Arms",topic:"Arms",question:"What is the function of the biceps brachii?",answer:"Flexes the elbow and supinates the forearm (turns the palm up); also assists shoulder flexion. Prime mover in curls and a contributor to all pulling movements."},{id:314,section:"muscles",chapter:"Muscles",chapterName:"Arms",topic:"Arms",question:"What is the function of the brachialis?",answer:"A pure elbow flexor lying beneath the biceps. It is the strongest elbow flexor and works regardless of forearm position. Emphasized in hammer and reverse curls; builds arm thickness."},{id:315,section:"muscles",chapter:"Muscles",chapterName:"Arms",topic:"Arms",question:"What is the function of the brachioradialis?",answer:"A forearm muscle that flexes the elbow, strongest when the hand is in a neutral (thumbs-up) position. Trained heavily in hammer and reverse curls; important for grip and pulling strength."},{id:316,section:"muscles",chapter:"Muscles",chapterName:"Arms",topic:"Arms",question:"What is the function of the triceps brachii?",answer:"Extends the elbow (straightens the arm); the long head also assists shoulder extension. Prime mover in all pressing and pushing — bench press, overhead press, dips, push-ups. Makes up about two-thirds of upper-arm mass."},{id:317,section:"muscles",chapter:"Muscles",chapterName:"Arms",topic:"Arms",question:"What is the function of the forearm flexors and extensors?",answer:"The flexors (palm side) bend the wrist and fingers and drive grip strength; the extensors (back of forearm) straighten the wrist and fingers. Essential for holding bars, gripping, and controlling implements in nearly every sport."},{id:318,section:"muscles",chapter:"Muscles",chapterName:"Core",topic:"Core",question:"What is the function of the rectus abdominis?",answer:"The 'six-pack' muscle. It flexes the spine (curling the ribs toward the pelvis), assists exhalation, and helps resist extension to brace the trunk. Trained in crunches, and stabilizes the torso in almost all lifting and athletic movements."},{id:319,section:"muscles",chapter:"Muscles",chapterName:"Core",topic:"Core",question:"What is the function of the external obliques?",answer:"On the sides of the abdomen. Bilaterally they flex the trunk and aid exhalation; unilaterally they side-bend the trunk and rotate it to the opposite side. Key for rotation and anti-rotation in throwing, swinging, and change of direction."},{id:320,section:"muscles",chapter:"Muscles",chapterName:"Core",topic:"Core",question:"What is the function of the internal obliques?",answer:"Lie beneath the external obliques. Bilaterally they flex the trunk and aid exhalation; unilaterally they side-bend and rotate the trunk to the same side. Work with the externals to produce and control rotation."},{id:321,section:"muscles",chapter:"Muscles",chapterName:"Core",topic:"Core",question:"What is the function of the transversus abdominis?",answer:"The deepest abdominal muscle, wrapping around the trunk like a belt. It compresses the abdomen and raises intra-abdominal pressure to stabilize the spine. The foundation of core bracing for heavy lifts and explosive movement."},{id:322,section:"muscles",chapter:"Muscles",chapterName:"Core",topic:"Core",question:"What is the function of the quadratus lumborum (QL)?",answer:"A deep lower-back muscle connecting the pelvis to the lowest rib and lumbar spine. It side-bends the trunk, stabilizes the spine and pelvis, and helps with forced exhalation. Important for posture and resisting lateral loads in carries and single-side work."},{id:323,section:"muscles",chapter:"Muscles",chapterName:"Glutes & Hips",topic:"Glutes & Hips",question:"What is the function of the gluteus maximus?",answer:"The largest, most powerful muscle in the body. It extends the hip (driving the thigh backward) and externally rotates it. Prime mover in sprinting, jumping, squats, deadlifts, and hip thrusts — the engine of athletic power."},{id:324,section:"muscles",chapter:"Muscles",chapterName:"Glutes & Hips",topic:"Glutes & Hips",question:"What is the function of the gluteus medius?",answer:"Abducts the hip (moves the leg out to the side) and, crucially, stabilizes the pelvis when standing on one leg. Prevents the hip and knee from collapsing inward during running, cutting, and single-leg movements."},{id:325,section:"muscles",chapter:"Muscles",chapterName:"Glutes & Hips",topic:"Glutes & Hips",question:"What is the function of the gluteus minimus?",answer:"The deepest, smallest gluteal muscle. It assists hip abduction and internal rotation and works with the gluteus medius to stabilize the pelvis during single-leg stance and gait."},{id:326,section:"muscles",chapter:"Muscles",chapterName:"Glutes & Hips",topic:"Glutes & Hips",question:"What is the function of the iliopsoas (hip flexors)?",answer:"The iliacus and psoas major, the body's main hip flexors, raising the thigh toward the torso. Drive the knee up in sprinting and kicking and stabilize the spine. Often tight in people who sit a lot, which can tip the pelvis forward."},{id:327,section:"muscles",chapter:"Muscles",chapterName:"Glutes & Hips",topic:"Glutes & Hips",question:"What is the function of the hip adductors?",answer:"The inner-thigh group (adductor magnus, longus, brevis, gracilis, pectineus). They pull the leg toward the midline, contribute to hip extension and flexion, and stabilize the pelvis. Heavily loaded in cutting, skating, and wide-stance squats; a common strain site (groin pull)."},{id:328,section:"muscles",chapter:"Muscles",chapterName:"Legs",topic:"Legs",question:"What is the function of the quadriceps?",answer:"A four-muscle group on the front of the thigh (rectus femoris, vastus lateralis, medialis, intermedius). They extend the knee (straighten the leg); the rectus femoris also flexes the hip. Prime movers in squatting, jumping, sprinting, and kicking."},{id:329,section:"muscles",chapter:"Muscles",chapterName:"Legs",topic:"Legs",question:"What is the function of the hamstrings?",answer:"Three muscles on the back of the thigh (biceps femoris, semitendinosus, semimembranosus). They flex the knee and extend the hip. Critical for sprinting and deceleration, and a frequent injury site when sprinting at speed."},{id:330,section:"muscles",chapter:"Muscles",chapterName:"Legs",topic:"Legs",question:"What is the function of the gastrocnemius?",answer:"The large, visible calf muscle. It plantarflexes the ankle (points the foot down) and assists knee flexion. Provides explosive push-off in running and jumping; trained with straight-leg calf raises."},{id:331,section:"muscles",chapter:"Muscles",chapterName:"Legs",topic:"Legs",question:"What is the function of the soleus?",answer:"A deep calf muscle beneath the gastrocnemius. It plantarflexes the ankle and works regardless of knee angle, so it dominates bent-knee calf raises. Key for endurance, standing posture, and sustained running."},{id:332,section:"muscles",chapter:"Muscles",chapterName:"Legs",topic:"Legs",question:"What is the function of the tibialis anterior?",answer:"The muscle on the front of the shin. It dorsiflexes the ankle (lifts the foot up) and helps control the foot as it lands. Important for running mechanics and preventing shin splints; trained with toe raises."}],m=[{section:"1",term:"360-degree breathing",definition:"With proper breathing, the pressure in the abdomen increases and the rib cage expands forward, sideways and backward."},{section:"1",term:"Active stability",definition:"The ability of muscles to hold joints and bone structures in position or prevent undesired movements in these joints or bone structures."},{section:"1",term:"Acute pain",definition:"Is usually short-lived and occurs in response to a specific warning signal of tissue damage, such as an injury."},{section:"1",term:"Agonist",definition:"The primary muscle responsible for initiating a specific movement. When a muscle contracts to perform a movement, it is the agonist. This muscle group is the most active and leads the movement."},{section:"1",term:"Anatomical position",definition:"A standing human with feet slightly apart and toes pointing forward, arms hanging, but positioned slightly away from the body, and palms facing forward."},{section:"1",term:"Antagonist",definition:"The muscle that works in opposition to the agonist. The antagonist is responsible for performing the opposite movement. When the agonist contracts to execute a movement, the antagonist must relax to allow that movement to happen. This helps to keep the movement controlled and smooth."},{section:"1",term:"Anterior",definition:"At the front of the body, where the navel/stomach is located."},{section:"1",term:"Anterior chain",definition:"The muscle groups at the front of the body, including the hip flexors, abdominal muscles and quadriceps."},{section:"1",term:"Anterior core",definition:"The front of the torso. In other words, the abdominal muscles at the front of the torso."},{section:"1",term:"Anterior pelvic tilt",definition:"The pelvis is tilted forward."},{section:"1",term:"Anthropometry",definition:"Literally 'the measurement of people' — the study of the body's dimensions and proportions."},{section:"1",term:"Anti-extension",definition:"When your back has to overcome an extension moment. Prevention of arching of the back."},{section:"1",term:"Anti-flexion",definition:"When your back has to overcome a flexion moment. Prevention of rounding of the back."},{section:"1",term:"Anti-lateroflexion",definition:"When your back has to overcome a lateral flexion moment. Prevention of sideways bending of the back."},{section:"1",term:"Anti-rotation",definition:"When your back has to overcome a rotational moment. Prevention of twisting of the back."},{section:"1",term:"Autonomic nervous system",definition:"Controls automatic, unconscious and involuntary functions and processes. The autonomic nervous system is divided into the sympathetic and parasympathetic nervous systems."},{section:"1",term:"Balance",definition:"Maintaining the center of gravity above the base of support."},{section:"1",term:"Base of support",definition:"The area beneath and between a body's points of contact with the ground. The wider this base, the easier it is to balance."},{section:"1",term:"Bilateral",definition:"Two-sided (for example, performing an exercise with both arms or legs)."},{section:"1",term:"Boyle’s Law",definition:"The pressure within a container increases as the volume of the container decreases."},{section:"1",term:"Center of gravity",definition:"The point where the body's weight is balanced equally on all sides and around which it can rotate freely. It shifts with body composition and how weight is distributed."},{section:"1",term:"Central nervous system (CNS)",definition:"The central nervous system consists of the brain and spinal cord. The central nervous system controls all bodily functions and acts as the control system of our body."},{section:"1",term:"Cervical",definition:"Referring to the neck vertebrae of the spine."},{section:"1",term:"Checkpoints",definition:"The key positions and actions you want to see in an exercise to keep movement quality high. They define the start position, the end position and what should happen in between, and can be used to coach almost any client at a basic level."},{section:"1",term:"Chronic pain",definition:"Is characterized by persistent or recurring pain that lasts longer than the expected healing period of an injury or condition."},{section:"1",term:"Closed kinetic chain",definition:"A movement in which the end of the limb (hand or foot) is fixed against a surface, so the joints move in a predictable, linked pattern. A push-up or squat is a closed-chain exercise; when a segment is fully fixed and no movement is possible, it is isometric."},{section:"1",term:"Closed-scissor position",definition:"When breathing in this position, the ribs remain positioned above the hips and the spine remains neutral. All the muscles of the inner and outer core unit are optimally able to generate force. This is also known as a stacked position."},{section:"1",term:"Coaching cycle",definition:"The four steps to coaching a client: observing, thinking of an intervention, introducing the intervention, and providing feedback on the implementation of the intervention."},{section:"1",term:"Coccygeal",definition:"Referring to the tailbone of the spine."},{section:"1",term:"Concentric contraction",definition:"When a muscle shortens during movement. For example, in a bicep curl when the elbow bends and the biceps brachii contracts and thus shortens."},{section:"1",term:"Core",definition:"The trunk; the central part of the body, including muscles, spine and pelvic floor. It provides stability and support, and plays an essential role in maintaining posture and daily movements. Core training focuses on strengthening these muscles for improved stability and strength."},{section:"1",term:"Core stability",definition:"During movements, no movement occurs in the trunk, allowing athletic performance to be executed by the limbs. This stability is essential for transferring energy between the lower and upper body and for stabilizing and protecting the spine."},{section:"1",term:"Delayed Onset Muscle Soreness (DOMS)",definition:"Stiffness in the muscle that occurs after training. DOMS is a sensation of dull, aching pain usually felt during movement or when touching the affected muscle. It is accompanied by sensitivity and stiffness. This is also known as muscle soreness."},{section:"1",term:"Distal",definition:"Further from the center point of the body as compared to another location. Related to the word distance."},{section:"1",term:"Dynamic contraction",definition:"When a muscle exerts force and moves. There are two types of dynamic contraction: concentric and eccentric contraction."},{section:"1",term:"Eccentric contraction",definition:"When a muscle lengthens during movement. For example, in a bicep curl, as the elbow extends and the biceps brachii lengthens."},{section:"1",term:"Energy leak",definition:"The point at which we lose energy during a movement. An inefficiency in the execution of a movement."},{section:"1",term:"Explicit",definition:"Very detailed and precise."},{section:"1",term:"Extension",definition:"Stretching or arching."},{section:"1",term:"External focus",definition:"The client is focused on the effect of the movement and not on how they perform the movement."},{section:"1",term:"Fine motor skills",definition:"Small movements with the hands and fingers, mouth and feet, such as those involved in drawing, writing and cutting."},{section:"1",term:"Flexibility",definition:"The ability of joints, muscles and connective tissue to move freely and pain-free. A flexible muscle isn't longer (muscles can't lengthen), it simply holds less tension, which gives you more range."},{section:"1",term:"Flexion",definition:"Bending or rounding."},{section:"1",term:"Fundamental motor skills",definition:"The basic movement skills that people need to be able to move. These skills are the building blocks of more complex movements. They are essential regardless of the specific sport or the level at which that sport is practiced. Examples of fundamental motor skills are speed, strength, flexibility, coordination and endurance."},{section:"1",term:"Golgi tendon organs",definition:"Sensors in the tendon that detect muscle tension, mainly as a muscle shortens. They sense how much external force the muscle must overcome and trigger just enough contraction to move under control or hold a position."},{section:"1",term:"Gross motor skills",definition:"Big movements like walking, swimming or kicking."},{section:"1",term:"Hyperkyphosis",definition:"An overly rounded upper back."},{section:"1",term:"Hyperlordosis",definition:"An overly arched lower back."},{section:"1",term:"Impulse",definition:"An electrical signal from the brain."},{section:"1",term:"Inferior",definition:"Always lower relative to another location."},{section:"1",term:"Inner core unit",definition:"This consists of the following muscles: diaphragm, pelvic floor, transversus abdominis (TVA), and multifidus."},{section:"1",term:"Intention",definition:"The goal of the set or the exercise as it is programmed. This is a combination of an exercise for a number of repetitions at a certain intensity. Other factors may also be added, such as movement speed, rest or time."},{section:"1",term:"Internal focus",definition:"The client is aware of the constituent movements of the overall movement and focuses on the task and effort being carried out."},{section:"1",term:"Intra-abdominal pressure",definition:"Pressure inside the abdomen created by breathing in. You raise it by bracing the abdominal, rib and pelvic-floor muscles against a held breath (closed airway), which stabilises the trunk."},{section:"1",term:"Isometric contraction",definition:"When a muscle exerts force, but does not initiate movement. The muscle remains in the same position (the same length) under tension. This is also known as static contraction."},{section:"1",term:"Kinetic chain",definition:"A series of joints and muscles working together to perform a motor task (movement)."},{section:"1",term:"Lateral",definition:"Away from the midline or further from the midline as compared to another location."},{section:"1",term:"Locus of control",definition:"How much you believe your own actions affect an outcome. An internal locus of control credits your own effort; an external one credits luck or outside forces."},{section:"1",term:"Lumbar",definition:"Referring to the lower-back (lumbar) vertebrae of the spine."},{section:"1",term:"Medial",definition:"Towards the midline of the body (which runs along the spine) or closer to the midline as compared to another location."},{section:"1",term:"Milo coaching method",definition:"Providing clients with the right experiences so that they learn to move better. This method is based on learning and combines manipulating the external environment, focusing on specific goals and providing targeted feedback."},{section:"1",term:"Mobility",definition:"Mobility of a joint refers to the flexibility you can actively control and in which you can function with strength and stability. Active flexibility is the range of motion of your joints that you can achieve without external assistance."},{section:"1",term:"Motor control",definition:"Control over motor nerves that can cause muscles to contract."},{section:"1",term:"Motor learning",definition:"The process by which experience influences the degree of motor control over time. It involves neurological adaptation."},{section:"1",term:"Motor skills",definition:"The functional ability of the body to move refined through repetition, i.e., experience. A distinction is made between gross motor skills and fine motor skills."},{section:"1",term:"Motor unit",definition:"A motor nerve cell (motor neuron) plus all the muscle fibres it connects to. When the neuron fires, those fibres contract, producing movement."},{section:"1",term:"Movement quality",definition:"Movement is high quality when it is smooth and efficient, with minimal energy leaks and the body used effectively."},{section:"1",term:"Muscle contraction",definition:"The tightening (or contracting) of muscle tissue."},{section:"1",term:"Muscle soreness",definition:"A stiffness in the muscle that arises after training. This is called Delayed Onset Muscle Soreness (DOMS). DOMS is a sensation of dull, aching pain, usually felt during movement or when touching the affected muscle, combined with tenderness and stiffness."},{section:"1",term:"Muscle spindles",definition:"Sensors inside the muscle that detect how much it is stretched, helping judge a joint's position and control muscle stiffness."},{section:"1",term:"Neutral spine",definition:"The small range around the spine's natural position where it still counts as neutral (roughly 2 to 9 degrees of lumbar flexion from standing). During movement the goal is to keep the spine within this zone rather than letting it shift."},{section:"1",term:"Objective pain",definition:"Pain that can be objectively observed or measured through external observation or medical tests. It is measurable, and there can be measurable signs of pain, such as increased heart rate, blood pressure, swelling or visible physical i
