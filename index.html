    topic: "Horizontal Push",
    question: "Why begin upper body progressions semi-vertical (high-to-low)?",
    answer: "Most people elevate the scapula easily but find protraction, retraction, and rotation harder. A high-to-low motion naturally guides the desired pattern. Also, the more vertical/overhead the work, the more upper back extension mobility it demands — which not all clients have."
  },
  {
    id: 507, section: "3", chapter: "3.5.1", chapterName: "Horizontal Push",
    topic: "Horizontal Push",
    question: "Why can unilateral upper body exercises help clients with limited mobility?",
    answer: "They allow rotation while extending, distributing the range of motion across multiple planes. This requires less upper back extension than bilateral exercises for the same shoulder range of motion."
  },
  {
    id: 508, section: "3", chapter: "3.5.1", chapterName: "Horizontal Push",
    topic: "Horizontal Push",
    question: "What is the key difference between a push-up and a bench press?",
    answer: "In the push-up the body moves and the scapula must protract at the top while keeping a neutral lower back. In the bench press the body is fixed on the bench, the scapulae stay retracted and depressed (no protraction), forming a stable platform — and leg drive adds stability."
  },
  {
    id: 509, section: "3", chapter: "3.5.1", chapterName: "Horizontal Push",
    topic: "Horizontal Push",
    question: "What are the three common energy leaks in push-ups?",
    answer: "Lumbar hyperextension (concentric phase), shoulder dump (eccentric phase), and elbow flaring (either phase)."
  },
  {
    id: 510, section: "3", chapter: "3.5.1", chapterName: "Horizontal Push",
    topic: "Horizontal Push",
    question: "What is the push-up progression sequence?",
    answer: "1. Plank (a push-up is a 'moving plank'). 2. Incline push-up. 3. Push-up. 4. Variations: parallette, ring, band-resisted, and weighted push-ups (for range of motion, stability, or added resistance)."
  },
  {
    id: 511, section: "3", chapter: "3.5.1", chapterName: "Horizontal Push",
    topic: "Horizontal Push",
    question: "What is 'leg drive' in the bench press?",
    answer: "Generating force from the legs and heels to stay firmly on the bench, maximizing stability from the heels all the way to the shoulder blades so you can press powerfully and efficiently."
  },
  {
    id: 512, section: "3", chapter: "3.5.1", chapterName: "Horizontal Push",
    topic: "Horizontal Push",
    question: "What are the three additional bench press energy leaks (beyond the three shared with push-ups)?",
    answer: "Feet lifting off the ground (insufficient leg drive), buttocks lifting off the bench (pushing upward instead of backward), and lifting the head (neck and thoracic flexion). The shared three are hyperextension, shoulder dump, and flaring elbows."
  },
  {
    id: 513, section: "3", chapter: "3.5.1", chapterName: "Horizontal Push",
    topic: "Horizontal Push",
    question: "How does elbow position change the focus of the bench press?",
    answer: "Elbows far from the body emphasize transverse adduction; elbows close to the body emphasize shoulder flexion."
  },

  // ── SECTION 3 · CHAPTER 3.5.2 · Horizontal Pull ───────────────────────
  {
    id: 514, section: "3", chapter: "3.5.2", chapterName: "Horizontal Pull",
    topic: "Horizontal Pull",
    question: "What is the coaching focus of the horizontal pull?",
    answer: "Retraction and protraction of the shoulder blades. The lower back stays neutral while the upper back moves from neutral/flexion to extension."
  },
  {
    id: 515, section: "3", chapter: "3.5.2", chapterName: "Horizontal Pull",
    topic: "Horizontal Pull",
    question: "What are the start and end scapular positions in a row?",
    answer: "Start: protraction without elevation — a slight stretch between the shoulder blades, no neck tension. End: retraction and depression ('back and inward'), with the upper back moving into extension."
  },
  {
    id: 516, section: "3", chapter: "3.5.2", chapterName: "Horizontal Pull",
    topic: "Horizontal Pull",
    question: "What are the three common energy leaks in the row?",
    answer: "Lumbar hyperextension, shoulder dump (shoulders coming forward at the end), and elevation of the shoulder blade (shoulders shooting up toward the ears)."
  },
  {
    id: 517, section: "3", chapter: "3.5.2", chapterName: "Horizontal Pull",
    topic: "Horizontal Pull",
    question: "What is the row progression sequence?",
    answer: "From constrained to free: 1. High-to-low row (encourages depression and retraction). 2. Single-arm DB row. 3. Incline chest-supported DB row. 4. Seated row (whole back moves freely, bilateral)."
  },
  {
    id: 518, section: "3", chapter: "3.5.2", chapterName: "Horizontal Pull",
    topic: "Horizontal Pull",
    question: "Single-arm DB row: elbows in vs. elbows out — what changes?",
    answer: "Elbows in emphasizes the lats through shoulder extension. Elbows out shifts the arm to transverse abduction, reducing the lats' contribution and increasing the workload on the upper back."
  },
  {
    id: 519, section: "3", chapter: "3.5.2", chapterName: "Horizontal Pull",
    topic: "Horizontal Pull",
    question: "Why is the 'armpit angle' important in rows?",
    answer: "It reflects how horizontal or vertical the pull is. The higher the shoulder relative to the hip, the smaller the armpit angle. Focusing on armpit angle and elbow position (closer to or farther from the body) is how you distinguish horizontal from semi-horizontal pulls."
  },

  // ── SECTION 3 · CHAPTER 3.6 · Vertical Push & Pull ────────────────────
  {
    id: 520, section: "3", chapter: "3.6", chapterName: "Vertical Push & Pull",
    topic: "Vertical Patterns",
    question: "What scapular movement dominates vertical patterns, and why?",
    answer: "Lateral and medial rotation (instead of protraction/retraction). Lateral rotation lifts the acromion — the shoulder's 'roof' — so the humeral head doesn't hit it. The scapula also posteriorly tilts to create space at the front."
  },
  {
    id: 521, section: "3", chapter: "3.6", chapterName: "Vertical Push & Pull",
    topic: "Vertical Patterns",
    question: "Why do vertical patterns demand more upper back mobility?",
    answer: "The more vertical/overhead the movement, the more upper back extension is required to allow the scapula to laterally rotate. Limited thoracic extension restricts overhead work, so semi-vertical variations suit less mobile clients."
  },
  {
    id: 522, section: "3", chapter: "3.6", chapterName: "Vertical Push & Pull",
    topic: "Vertical Patterns",
    question: "Vertical PUSH: arm movement, active muscles, and main energy leak?",
    answer: "The arm moves from beside the body to overhead (flexion and/or abduction). Active: middle and anterior deltoid, pectoralis major, triceps (over elbow), trapezius, and serratus anterior. Main leak: staying in internal rotation — the shoulder must slightly externally rotate to avoid impingement; insufficient upper back extension causes lumbar hyperextension."
  },
  {
    id: 523, section: "3", chapter: "3.6", chapterName: "Vertical Push & Pull",
    topic: "Vertical Patterns",
    question: "Vertical PULL: arm movement, active muscles, and scapular movement?",
    answer: "The arm moves from overhead down to beside the body (extension and/or adduction). Active: latissimus dorsi, teres major, biceps & brachialis (over elbow), trapezius, and rhomboids. The scapula transitions from lateral rotation to medial rotation."
  },

  // ── SECTION 3 · CHAPTER 3.6.1 · Vertical Push ─────────────────────────
  {
    id: 524, section: "3", chapter: "3.6.1", chapterName: "Vertical Push",
    topic: "Vertical Push",
    question: "How does the scapula move through a vertical push (start to end)?",
    answer: "Start neutral and depressed — flush against the ribcage, back and down. End in lateral rotation with slight elevation. During the concentric phase the arm and hand travel upward in a semicircle."
  },
  {
    id: 525, section: "3", chapter: "3.6.1", chapterName: "Vertical Push",
    topic: "Vertical Push",
    question: "What is the 'scapular plane' and why do most people press there?",
    answer: "A position where the elbow is between flexion and abduction. Full abduction overhead demands significant mobility, so most people find their strongest overhead press in the scapular plane."
  },
  {
    id: 526, section: "3", chapter: "3.6.1", chapterName: "Vertical Push",
    topic: "Vertical Push",
    question: "What are the most common energy leaks in the vertical push?",
    answer: "Lumbar hyperextension, shoulder blade elevation, lateral flexion of the torso, wrist not above the elbow, and elbow/wrist misaligned with the shoulder at the end position."
  },
  {
    id: 527, section: "3", chapter: "3.6.1", chapterName: "Vertical Push",
    topic: "Vertical Push",
    question: "What is the vertical push progression sequence?",
    answer: "From semi-vertical to fully vertical, and unilateral to bilateral: 1. Standing landmine press. 2. Half-kneeling landmine press. 3. Half-kneeling DB overhead press. 4. Standing DB press. 5. Standing barbell overhead (military) press. Bilateral presses demand the most mobility and thoracic extension."
  },
  {
    id: 528, section: "3", chapter: "3.6.1", chapterName: "Vertical Push",
    topic: "Vertical Push",
    question: "How does moving from a standing to a half-kneeling landmine press change the demands?",
    answer: "The armpit angle widens, making the movement more vertical. This increases lateral rotation and decreases protraction of the scapula, and the higher bar position demands more upper back extension. The load's moment arm also lengthens, intensifying resistance."
  },

  // ── SECTION 3 · CHAPTER 3.6.2 · Vertical Pull ─────────────────────────
  {
    id: 529, section: "3", chapter: "3.6.2", chapterName: "Vertical Pull",
    topic: "Vertical Pull",
    question: "What are the two crucial points of the vertical pull?",
    answer: "1. Move the scapula from a laterally rotated position into medial rotation, retraction, and depression ('back and down'). 2. At the end, the upper back is extended and the shoulder is externally rotated."
  },
  {
    id: 530, section: "3", chapter: "3.6.2", chapterName: "Vertical Pull",
    topic: "Vertical Pull",
    question: "What is the most common energy leak in vertical pulling, and the fix?",
    answer: "Shoulder dump: the arm/elbow initiates the pull with little scapular engagement. The scapula should move first (back and down), then the elbow flexes. Teaching scapula-first movement is the key."
  },
  {
    id: 531, section: "3", chapter: "3.6.2", chapterName: "Vertical Pull",
    topic: "Vertical Pull",
    question: "What are the three energy leaks in the vertical pull?",
    answer: "Shoulder dump, lumbar hyperextension, and the forearm ending horizontal instead of vertical at the end position (elbow going back instead of down)."
  },
  {
    id: 532, section: "3", chapter: "3.6.2", chapterName: "Vertical Pull",
    topic: "Vertical Pull",
    question: "Supinated vs. pronated lat pulldown — what's the difference?",
    answer: "Supinated (underhand, narrow, chin-up grip): palms face you, the arm moves in extension, training the lat in that function. Pronated (overhand, wide, pull-up grip): palms face away, the arm moves primarily in adduction, training the lat in that function."
  },
  {
    id: 533, section: "3", chapter: "3.6.2", chapterName: "Vertical Pull",
    topic: "Vertical Pull",
    question: "What is the vertical pull progression sequence?",
    answer: "Single-arm cable pulldown → supinated or pronated lat pulldown → chin-up. Teach scapula-first movement in three phases: scapula pulldowns, then a two-step (blades back and down, then elbow to hip), then one fluid motion."
  },
  {
    id: 534, section: "3", chapter: "3.6.2", chapterName: "Vertical Pull",
    topic: "Vertical Pull",
    question: "What is the difference between a chin-up and a pull-up?",
    answer: "Chin-up: supinated (underhand) grip with elbows tucked. Pull-up: elbows point outward, a harder position for the lats and biceps to generate force and more demanding on the upper back to hold the scapula and arm position."
  },
  {
    id: 535, section: "3", chapter: "3.6.2", chapterName: "Vertical Pull",
    topic: "Vertical Pull",
    question: "When should you avoid starting chin-ups too early, and what are the progression options?",
    answer: "Avoid for significantly overweight clients (very high strength buy-in) and clients whose vertical pulling rhythm is far from ideal (rhythm is hard to coach mid-chin-up). Progression options: assisted pull-up machine, band-assisted chin-up (horizontal band preferred), and eccentric-only chin-ups."
  },

  // ── SECTION 4 · CHAPTER 4.2.1 · Everything is Stress ──────────────────
  {
    id: 600, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "How is stress defined (Sarafino & Smith)?",
    answer: "A circumstance, real or perceived, in which a person observes a discrepancy between the physical or psychological demands of a situation and the resources of their biological, psychological, or social system. It can be analyzed as both an experience and a physiological event."
  },
  {
    id: 601, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "What are catabolic and anabolic processes, and which nervous system controls each?",
    answer: "Catabolic = breaking-down processes that release immediately available energy, driven by the sympathetic nervous system (fight/flight). Anabolic = building and recovery processes, driven by the parasympathetic nervous system (rest/digest). The body constantly does both, even at rest."
  },
  {
    id: 602, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "What is homeostasis?",
    answer: "The biological principle whereby the body continuously strives to maintain a stable internal environment (temperature, blood pressure, blood sugar, acidity) within narrow limits, despite changes in external conditions."
  },
  {
    id: 603, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "What is a setpoint?",
    answer: "The natural level of physical performance or body composition to which the body adapts. After a strong stressor with sufficient recovery, the body can settle at a new, higher setpoint."
  },
  {
    id: 604, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "Why is a completely stress-free life undesirable?",
    answer: "Without stressors the body slowly weakens: muscle mass, bone density, oxygen uptake, and brain capacity all decrease. Stress is an essential part of life, provided there are enough resources to recover and maintain homeostasis."
  },
  {
    id: 605, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "What is a stressor versus stress perception?",
    answer: "A stressor is the stimulus itself. Stress perception is the individual's perception of that stressor. Stress arises from the duration and intensity of the stressor, amplified or weakened by stress perception, making it highly situational."
  },
  {
    id: 606, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "What is the G.A.S. model and who created it?",
    answer: "The General Adaptation Syndrome, introduced by Hans Selye (first published 1936). It shows how stressors disrupt homeostasis in three phases, with the body responding the same way to different forms of stress. Repeated exposure to a stressor produces adaptation."
  },
  {
    id: 607, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "What are the three phases of the G.A.S. model?",
    answer: "1. Alarm phase. 2. Resistance phase. 3. Exhaustion phase."
  },
  {
    id: 608, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "What happens in the alarm phase?",
    answer: "Homeostasis is disrupted and the body makes resources available via a fight/flight/freeze response (raised heart rate, breathing, glucose release, muscle tension). A fast wave comes through the sympathetic system (adrenaline/noradrenaline) and a slower wave through the HPA axis (cortisol). The immune system is temporarily weakened."
  },
  {
    id: 609, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "What is the HPA axis?",
    answer: "The hypothalamic-pituitary-adrenal axis — the slower hormonal branch of the stress response (hypothalamus → pituitary → adrenal cortex). It produces corticosteroids, including cortisol, the stress hormone."
  },
  {
    id: 610, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "What happens in the resistance phase?",
    answer: "If the stressor persists, the body keeps releasing extra energy (steady or intense); you're highly alert and focused. The affective (emotional) reaction is processed in the brain, and the strong emotional response helps you remember the cause — the brain is literally restructured by stress."
  },
  {
    id: 611, section: "4", chapter: "4.2.1", chapterName: "Everything is Stress",
    topic: "Stress & GAS Model",
    question: "What happens in the exhaustion phase?",
    answer: "The final phase, in which the extra energy is depleted and the body can no longer resist the stressor because its resources are exhausted. It's important to escape or remove the stressor before this point to prevent illness or irreparable damage."
  },

  // ── SECTION 4 · CHAPTER 4.2.2 · How the Body Changes ──────────────────
  {
    id: 612, section: "4", chapter: "4.2.2", chapterName: "How the Body Changes",
    topic: "Adaptation & Training Principles",
    question: "What is the difference between morphological and neurological adaptations?",
    answer: "Morphological = changes in the body's tissues (muscle growth/hypertrophy, fat loss, stronger bones and tendons) — changes in the body's 'shape'. Neurological = changes in the nervous system's efficiency and effectiveness (motor skills, a higher 1RM, translating coaching into execution)."
  },
  {
    id: 613, section: "4", chapter: "4.2.2", chapterName: "How the Body Changes",
    topic: "Adaptation & Training Principles",
    question: "What do both adaptation types require, and how do they differ?",
    answer: "Both require a cycle of resistance, fatigue, and recovery (anabolic recovery in the parasympathetic system). Morphological adaptations need more building blocks (nutrition) and prolonged, heavy fatigue — duration matters. Neurological adaptations depend on quality of performance rather than fatigue itself. Both compete for the same resources."
  },
  {
    id: 614, section: "4", chapter: "4.2.2", chapterName: "How the Body Changes",
    topic: "Adaptation & Training Principles",
    question: "What are the four phases of the training process?",
    answer: "1. Stress disrupts homeostasis. 2. A signal is sent that adaptation is required. 3. Genetic route. 4. Restructuring and adapting."
  },
  {
    id: 615, section: "4", chapter: "4.2.2", chapterName: "How the Body Changes",
    topic: "Adaptation & Training Principles",
    question: "What is a threshold and an overload stimulus?",
    answer: "Threshold = the minimum level of fatigue that must be reached to enable adaptation. Overload stimulus = a stimulus strong and long enough in duration and intensity to break through that threshold and elicit an anabolic response — 'heavier than normal'."
  },
  {
    id: 616, section: "4", chapter: "4.2.2", chapterName: "How the Body Changes",
    topic: "Adaptation & Training Principles",
    question: "What does the 'genetic route' phase mean for a trainer?",
    answer: "Individuals adapt differently to the same stressor because of DNA. DNA helps performance through favorable physical/mental composition and through interaction with the environment (challenge is needed to realize potential). Trainers must individualize programs and follow each client's own speed of adaptation."
  },
  {
    id: 617, section: "4", chapter: "4.2.2", chapterName: "How the Body Changes",
    topic: "Adaptation & Training Principles",
    question: "What is supercompensation?",
    answer: "When the right amount of a specific stressor causes specific fatigue, followed by recovery and adaptation, so the body strengthens beyond its original setpoint and handles future stress better. If the stimulus decreases, the body returns to its original setpoint."
  },
  {
    id: 618, section: "4", chapter: "4.2.2", chapterName: "How the Body Changes",
    topic: "Adaptation & Training Principles",
    question: "How does overload differ from fatigue?",
    answer: "Overload is a stimulus long and/or strong enough to trigger a powerful anabolic reaction and, with enough recovery, supercompensation. Fatigue alone doesn't guarantee it — fatigue of insufficient duration/intensity, or poor recovery, won't produce supercompensation."
  },
  {
    id: 619, section: "4", chapter: "4.2.2", chapterName: "How the Body Changes",
    topic: "Adaptation & Training Principles",
    question: "What is progressive overload, and how does it differ from progression?",
    answer: "As the setpoint rises, the stimulus must be increased or adjusted over time (via intensity, volume, frequency, or duration) to stay effective. Progressive overload is the deliberate choice the trainer makes; progression (getting stronger, more reps) is the resulting outcome."
  },
  {
    id: 620, section: "4", chapter: "4.2.2", chapterName: "How the Body Changes",
    topic: "Adaptation & Training Principles",
    question: "What is the SAID principle?",
    answer: "Specific Adaptation to Imposed Demand: only what you fatigue or exhaust will change. The more specific the fatiguing stimulus, the more targeted the body's deployment of resources and the resulting supercompensation."
  },

  // ── SPECIAL SECTION · MUSCLES & THEIR FUNCTION ──────────────────────────────
  // ── 3.1 · Chest & Shoulders ──
  {
    id: 300, section: "muscles", chapter: "Muscles", chapterName: "Chest & Shoulders",
    topic: "Chest & Shoulders",
    question: "What is the function of the pectoralis major?",
    answer: "The large fan-shaped chest muscle. It produces horizontal adduction (bringing the arm across the body), shoulder flexion, and internal rotation of the upper arm. Prime mover in the bench press, push-up, and any pressing or pushing action in sport."
  },
  {
    id: 301, section: "muscles", chapter: "Muscles", chapterName: "Chest & Shoulders",
    topic: "Chest & Shoulders",
    question: "What is the function of the pectoralis minor?",
    answer: "A small muscle beneath the pec major. It protracts, depresses, and downwardly rotates the scapula, and helps stabilize the shoulder blade against the rib cage. Tightness here is a common cause of rounded-shoulder posture."
  },
  {
    id: 302, section: "muscles", chapter: "Muscles", chapterName: "Chest & Shoulders",
    topic: "Chest & Shoulders",
    question: "What is the function of the anterior (front) deltoid?",
    answer: "Shoulder flexion (raising the arm to the front) and internal rotation. Heavily involved in overhead and front pressing, front raises, and any throwing or punching action."
  },
  {
    id: 303, section: "muscles", chapter: "Muscles", chapterName: "Chest & Shoulders",
    topic: "Chest & Shoulders",
    question: "What is the function of the lateral (middle) deltoid?",
    answer: "Shoulder abduction — lifting the arm out to the side. The main mover in lateral raises and a key contributor to overhead pressing. Gives the shoulder its rounded, capped width."
  },
  {
    id: 304, section: "muscles", chapter: "Muscles", chapterName: "Chest & Shoulders",
    topic: "Chest & Shoulders",
    question: "What is the function of the posterior (rear) deltoid?",
    answer: "Shoulder extension, horizontal abduction (pulling the arm back), and external rotation. Trained in rows, reverse flyes, and face pulls. Important for shoulder balance and posture."
  },
  {
    id: 305, section: "muscles", chapter: "Muscles", chapterName: "Chest & Shoulders",
    topic: "Chest & Shoulders",
    question: "What is the function of the rotator cuff?",
    answer: "A group of four deep muscles (supraspinatus, infraspinatus, teres minor, subscapularis) that rotate the upper arm and, most importantly, hold the head of the humerus centered in the shoulder socket. Critical for shoulder stability in throwing, pressing, and overhead sports."
  },
  {
    id: 306, section: "muscles", chapter: "Muscles", chapterName: "Chest & Shoulders",
    topic: "Chest & Shoulders",
    question: "What is the function of the serratus anterior?",
    answer: "Protracts the scapula (pulls it forward around the rib cage) and upwardly rotates it, allowing the arm to reach fully overhead. Often called the 'boxer's muscle' for its role in punching and pushing. Key for healthy overhead pressing."
  },

  // ── 3.2 · Back ──
  {
    id: 307, section: "muscles", chapter: "Muscles", chapterName: "Back",
    topic: "Back",
    question: "What is the function of the latissimus dorsi?",
    answer: "The large 'wing' muscle of the back. It produces shoulder extension, adduction (pulling the arm down to the side), and internal rotation. Prime mover in pull-ups, lat pulldowns, and rows; also a powerful contributor to pulling and swimming."
  },
  {
    id: 308, section: "muscles", chapter: "Muscles", chapterName: "Back",
    topic: "Back",
    question: "What is the function of the upper trapezius?",
    answer: "Elevates the scapula (shrugging) and helps extend and rotate the neck. Active in shrugs, deadlift lockout, and carrying loads. Stabilizes the shoulder girdle under heavy overhead and pulling work."
  },
  {
    id: 309, section: "muscles", chapter: "Muscles", chapterName: "Back",
    topic: "Back",
    question: "What is the function of the middle and lower trapezius?",
    answer: "The middle traps retract the scapula (pull the shoulder blades together); the lower traps depress and upwardly rotate it. Together they stabilize the scapula during pulling and pressing and are essential for good posture."
  },
  {
    id: 310, section: "muscles", chapter: "Muscles", chapterName: "Back",
    topic: "Back",
    question: "What is the function of the rhomboids?",
    answer: "Retract the scapula (squeeze the shoulder blades together) and downwardly rotate it. Work alongside the middle traps in rows and any pulling movement, and help hold the shoulders back against rounding."
  },
  {
    id: 311, section: "muscles", chapter: "Muscles", chapterName: "Back",
    topic: "Back",
    question: "What is the function of the teres major?",
    answer: "A small muscle below teres minor, often called the 'lat's little helper.' It assists shoulder extension, adduction, and internal rotation, working with the lats in pulling movements."
  },
  {
    id: 312, section: "muscles", chapter: "Muscles", chapterName: "Back",
    topic: "Back",
    question: "What is the function of the erector spinae?",
    answer: "A group of muscles running either side of the spine. Bilaterally they extend (straighten) the spine; unilaterally they side-bend and rotate it. They keep the torso rigid and upright under load in deadlifts, squats, and almost every athletic position."
  },

  // ── 3.3 · Arms ──
  {
    id: 313, section: "muscles", chapter: "Muscles", chapterName: "Arms",
    topic: "Arms",
    question: "What is the function of the biceps brachii?",
    answer: "Flexes the elbow and supinates the forearm (turns the palm up); also assists shoulder flexion. Prime mover in curls and a contributor to all pulling movements."
  },
  {
    id: 314, section: "muscles", chapter: "Muscles", chapterName: "Arms",
    topic: "Arms",
    question: "What is the function of the brachialis?",
    answer: "A pure elbow flexor lying beneath the biceps. It is the strongest elbow flexor and works regardless of forearm position. Emphasized in hammer and reverse curls; builds arm thickness."
  },
  {
    id: 315, section: "muscles", chapter: "Muscles", chapterName: "Arms",
    topic: "Arms",
    question: "What is the function of the brachioradialis?",
    answer: "A forearm muscle that flexes the elbow, strongest when the hand is in a neutral (thumbs-up) position. Trained heavily in hammer and reverse curls; important for grip and pulling strength."
  },
  {
    id: 316, section: "muscles", chapter: "Muscles", chapterName: "Arms",

// ─────────────────────────────────────────────
//  TOPICS & SECTIONS
// ─────────────────────────────────────────────
const TOPICS_BY_SECTION = {
    '1': ['All', 'Movement Science', 'Anatomy', 'Neuromuscular System', 'Breathing & Stability', 'Motor Learning & Coaching', 'Core Training'],
    '2': ['All', 'Forces', 'Types of Motion', 'Center of Gravity & Balance', 'Moment & Torque', 'Levers', 'Strength Training', 'Movement Terms', 'Planes & Axes', 'Lower Body Muscles', 'The Hip', 'Hinge Basics', 'RDL Coaching', 'Hinge Energy Leaks', 'Hinge Progression', 'Hinge Muscles Worked', 'Squat Basics', 'Front Squat Coaching', 'Squat Mobility', 'Energy Leaks', 'Squat Progression', 'Muscles Worked'],
    '3': ['All', 'Biomechanics Recap', 'Types of Resistance', 'Resistance Curve', 'Strength Applications', 'Scapular Movements', 'Shoulder Girdle', 'Push & Pull Muscles', 'Scapulohumeral Rhythm', 'Undesired Rhythms', 'External Focus', 'Coaching Interventions', 'Horizontal Patterns', 'Horizontal Push', 'Horizontal Pull', 'Vertical Patterns', 'Vertical Push', 'Vertical Pull'],
    '4': ['All', 'Stress & GAS Model', 'Adaptation & Training Principles'],
    'muscles': ['All', 'Chest & Shoulders', 'Back', 'Arms', 'Core', 'Glutes & Hips', 'Legs']
};
const SECTION_NAMES = {
    '1': 'Core Business',
    '2': 'Lower Body & Biomechanics',
    '3': 'Upper Body',
    '4': 'Stress & Adaptation',
    'muscles': 'Muscles'
};
const ALL_SECTIONS = ['1', '2', '3', '4', 'muscles'];

// ─────────────────────────────────────────────
//  PERSISTENCE (localStorage)
// ─────────────────────────────────────────────
const STORAGE_KEY = 'milo_flashcards_v2';

function saveProgress() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            activeSection: state.activeSection,
            activeTopic: state.activeTopic,
            mode: state.mode,
            currentIndex: state.currentIndex,
            completed: state.completed,
            knownIds: [...state.knownIds],
            againIds: [...state.againIds],
            seenIds: [...state.seenIds],
            // Save the deck order (card IDs) so random stays consistent between sessions
            deckIds: state.deck.map(c => c.id),
            savedAt: Date.now()
        }));
        // Show brief "Saved" indicator
        const badge = document.getElementById('savedBadge');
        if (badge) {
            badge.textContent = 'Progress saved';
            clearTimeout(badge._t);
            badge._t = setTimeout(() => { badge.textContent = ''; }, 2000);
        }
    } catch(e) { /* storage unavailable */ }
}

function loadProgress() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const saved = JSON.parse(raw);
        return saved;
    } catch(e) { return null; }
}

function clearProgress() {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    state.knownIds = new Set();
    state.againIds = new Set();
    state.seenIds = new Set();
    buildDeck();
    render();
}

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let state = {
    activeSection: '1',
    activeTopic: 'All',
    mode: 'sequential',
    deck: [],
    currentIndex: 0,
    isFlipped: false,
    knownIds: new Set(),
    againIds: new Set(),
    seenIds: new Set(),
    completed: false
};

// ─────────────────────────────────────────────
//  DECK MANAGEMENT
// ─────────────────────────────────────────────
function buildDeck(savedDeckIds) {
    let filtered = FLASHCARDS.filter(c => c.section === state.activeSection);
    if (state.activeTopic !== 'All') {
        filtered = filtered.filter(c => c.topic === state.activeTopic);
    }
    // Restore saved deck order if provided (keeps random order consistent)
    if (savedDeckIds && savedDeckIds.length > 0) {
        const idMap = Object.fromEntries(FLASHCARDS.map(c => [c.id, c]));
        const restored = savedDeckIds.map(id => idMap[id]).filter(Boolean);
        // Only use if it covers the same set (topic/section hasn't changed)
        if (restored.length === filtered.length) {
            filtered = restored;
        } else if (state.mode === 'random') {
            filtered = [...filtered].sort(() => Math.random() - 0.5);
        }
    } else if (state.mode === 'random') {
        filtered = [...filtered].sort(() => Math.random() - 0.5);
    }
    state.deck = filtered;
    state.currentIndex = 0;
    state.isFlipped = false;
    state.completed = false;
    state.seenIds = new Set();
}

function resetDeck() {
    state.knownIds = new Set();
    state.againIds = new Set();
    buildDeck();
    saveProgress();
    render();
}

function setMode(mode) {
    state.mode = mode;
    buildDeck();
    saveProgress();
    render();
}

function setSection(section) {
    state.activeSection = section;
    state.activeTopic = 'All';
    buildDeck();
    saveProgress();
    render();
}

function setTopic(topic) {
    state.activeTopic = topic;
    buildDeck();
    saveProgress();
    render();
}

// ─────────────────────────────────────────────
//  CARD INTERACTIONS
// ─────────────────────────────────────────────
function flipCard() {
    if (state.completed) return;
    state.isFlipped = !state.isFlipped;
    // Toggle the CSS class directly for a smooth flip, then update the action buttons
    const fc = document.querySelector('.flashcard');
    if (fc) fc.classList.toggle('flipped', state.isFlipped);
    // Re-render only the action row in place
    const wrap = document.querySelector('.card-wrap');
    if (wrap) {
        const existing = wrap.querySelector('.action-row');
        const tmp = document.createElement('div');
        tmp.innerHTML = actionsHTML();
        const newRow = tmp.firstElementChild;
        if (existing && newRow) wrap.replaceChild(newRow, existing);
        else if (newRow) wrap.appendChild(newRow);
    }
}

function markCard(status) {
    const card = state.deck[state.currentIndex];
    if (!card) return;

    if (status === 'known') {
        state.knownIds.add(card.id);
        state.againIds.delete(card.id);
    } else {
        state.againIds.add(card.id);
        state.knownIds.delete(card.id);
    }

    state.seenIds.add(card.id);
    advance();
}

function navigate(dir) {
    const newIndex = state.currentIndex + dir;
    if (newIndex < 0 || newIndex >= state.deck.length) return;
    state.currentIndex = newIndex;
    state.isFlipped = false;
    saveProgress();
    renderCard();
    renderActions();
    renderProgress();
}

function advance() {
    const next = state.currentIndex + 1;
    if (next >= state.deck.length) {
        state.completed = true;
        saveProgress();
        renderCard();
        renderActions();
        renderProgress();
    } else {
        state.currentIndex = next;
        state.isFlipped = false;
        saveProgress();
        renderCard();
        renderActions();
        renderProgress();
    }
}

function studyAgainOnly() {
    const againCards = state.deck.filter(c => state.againIds.has(c.id));
    if (againCards.length === 0) return;
    state.deck = state.mode === 'random' ? [...againCards].sort(() => Math.random() - 0.5) : againCards;
    state.currentIndex = 0;
    state.isFlipped = false;
    state.completed = false;
    saveProgress();
    render();
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render() {
    renderSectionNav();
    renderFilterBar();
    renderModeToggle();
    renderProgress();
    renderCard();
    renderActions();
}

function renderSectionNav() {
    const nav = document.getElementById('sectionNav');
    nav.innerHTML = ALL_SECTIONS.map(s =>
        `<button class="section-btn ${s === state.activeSection ? 'active' : ''}" onclick="setSection('${s}')">
            ${/^[0-9]+$/.test(s) ? `Section ${s} — ${SECTION_NAMES[s]}` : SECTION_NAMES[s]}
        </button>`
    ).join('');
}

function renderFilterBar() {
    const bar = document.getElementById('filterBar');
    const topics = TOPICS_BY_SECTION[state.activeSection] || ['All'];
    bar.innerHTML = `<span class="filter-label">Topic</span>` +
        topics.map(t =>
            `<button class="topic-pill ${t === state.activeTopic ? 'active' : ''}" onclick="setTopic('${t}')">${t}</button>`
        ).join('');
}

function renderModeToggle() {
    const seqBtn = document.getElementById('modeSeq');
    const randBtn = document.getElementById('modeRand');
    if (!seqBtn) return;
    seqBtn.classList.toggle('active', state.mode === 'sequential');
    randBtn.classList.toggle('active', state.mode === 'random');
}

function renderProgress() {
    const section = document.getElementById('progressSection');
    const { deck, currentIndex, knownIds, againIds, completed } = state;
    const total = deck.length;
    const pos = completed ? total : currentIndex + 1;
    const pct = total === 0 ? 0 : Math.round(((completed ? total : currentIndex) / total) * 100);
    const known = deck.filter(c => knownIds.has(c.id)).length;
    const again = deck.filter(c => againIds.has(c.id)).length;
    const topicLabel = state.activeTopic === 'All' ? 'All topics' : state.activeTopic;

    section.innerHTML = `
        <div class="progress-meta">
            <span class="progress-topic">${topicLabel}</span>
            <span class="progress-count">${pos} / ${total}</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="stats-row">
            <span class="stat-chip known">${known} known</span>
            <span class="stat-chip again">${again} study again</span>
            <span class="stat-chip unseen">${total - known - again} unseen</span>
        </div>
    `;
}

const chevronLeft  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`;
const chevronRight = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;

function actionsHTML() {
    const { deck, currentIndex, isFlipped, completed } = state;
    if (deck.length === 0 || completed) return '';
    const prevDis = currentIndex === 0 ? 'disabled' : '';
    const nextDis = currentIndex === deck.length - 1 ? 'disabled' : '';
    if (!isFlipped) {
        return `<div class="action-row">
            <button class="nav-btn" onclick="navigate(-1)" ${prevDis}>${chevronLeft}</button>
            <button class="action-btn btn-flip" onclick="flipCard()">Reveal answer</button>
            <button class="nav-btn" onclick="navigate(1)" ${nextDis}>${chevronRight}</button>
        </div>`;
    } else {
        return `<div class="action-row">
            <button class="nav-btn" onclick="navigate(-1)" ${prevDis}>${chevronLeft}</button>
            <button class="action-btn btn-again" onclick="markCard('again')">Study again</button>
            <button class="action-btn btn-know" onclick="markCard('known')">Got it</button>
            <button class="nav-btn" onclick="navigate(1)" ${nextDis}>${chevronRight}</button>
        </div>`;
    }
}

function renderCard() {
    const container = document.getElementById('cardContainer');
    const { deck, currentIndex, isFlipped, completed, knownIds, againIds } = state;

    if (deck.length === 0) {
        container.innerHTML = `
            <div class="complete-card">
                <div class="complete-title">No cards</div>
                <div class="complete-sub">No flashcards match the current filter.<br>Try selecting a different topic.</div>
            </div>`;
        return;
    }

    if (completed) {
        const known = deck.filter(c => knownIds.has(c.id)).length;
        const again = deck.filter(c => againIds.has(c.id)).length;
        container.innerHTML = `
            <div class="complete-card">
                <div class="complete-title">Deck Complete</div>
                <div class="complete-sub">You've gone through all ${deck.length} cards.</div>
                <div class="complete-stats">
                    <div class="complete-stat">
                        <div class="complete-stat-num green">${known}</div>
                        <div class="complete-stat-label">Known</div>
                    </div>
                    <div class="complete-stat">
                        <div class="complete-stat-num amber">${again}</div>
                        <div class="complete-stat-label">Study again</div>
                    </div>
                </div>
                <div class="complete-actions">
                    <button class="btn-primary" onclick="resetDeck()">Restart all cards</button>
                    ${again > 0 ? `<button class="btn-secondary" onclick="studyAgainOnly()">Study ${again} again</button>` : ''}
                </div>
            </div>`;
        return;
    }

    const card = deck[currentIndex];
    const answerLines = card.answer.split('\n').map(l => `<p style="margin-bottom:6px">${l}</p>`).join('');

    container.innerHTML = `
        <div class="card-wrap">
            <div class="card-area">
                <div class="flashcard ${isFlipped ? 'flipped' : ''}" onclick="flipCard()">
                    <div class="card-face front">
                        <div class="card-chapter">${card.chapter} — ${card.chapterName}</div>
                        <div class="card-topic-tag">${card.topic}</div>
                        <div class="card-label">Question</div>
                        <div class="card-question">${card.question}</div>
                    </div>
                    <div class="card-face back">
                        <div class="card-chapter">${card.chapter} — ${card.chapterName}</div>
                        <div class="card-topic-tag">${card.topic}</div>
                        <div class="card-label">Answer</div>
                        <div class="card-answer">${answerLines}</div>
                    </div>
                </div>
            </div>
            ${actionsHTML()}
        </div>`;
}

// Kept for compatibility — actions are now co-rendered inside renderCard
function renderActions() { /* no-op */ }

// ─────────────────────────────────────────────
//  INIT — restore saved progress or start fresh
// ─────────────────────────────────────────────
(function init() {
    const saved = loadProgress();
    if (saved) {
        state.activeSection = saved.activeSection || '1';
        state.activeTopic   = saved.activeTopic   || 'All';
        state.mode          = saved.mode           || 'sequential';
        state.knownIds      = new Set(saved.knownIds || []);
        state.againIds      = new Set(saved.againIds || []);
        state.seenIds       = new Set(saved.seenIds  || []);
        // Restore the deck in its saved order
        buildDeck(saved.deckIds);
        // Restore position (clamp to valid range)
        state.currentIndex = Math.min(saved.currentIndex || 0, Math.max(state.deck.length - 1, 0));
        state.completed    = saved.completed || false;
        render();
        // Show resume toast if there was meaningful progress
        if ((saved.knownIds || []).length > 0 || (saved.currentIndex || 0) > 0) {
            showToast('Resumed from last session');
        }
    } else {
        buildDeck();
        render();
    }
})();

function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = `
        position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
        background:var(--black); color:white; padding:10px 20px;
        border-radius:8px; font-size:13px; font-weight:600;
        letter-spacing:0.3px; z-index:999;
        animation: fadeup 0.3s ease;
    `;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2800);
}

const toastCSS = document.createElement('style');
toastCSS.textContent = `@keyframes fadeup { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }`;
document.head.appendChild(toastCSS);
</script>
