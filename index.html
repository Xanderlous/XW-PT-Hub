njuries."},{section:"1",term:"Open-scissor position",definition:"The position assumed when we take a deep breath and arch the back."},{section:"1",term:"Outer core unit",definition:"The muscles involved are: internal and external obliques, rectus abdominis, the gluteus muscles, and the latissimus dorsi."},{section:"1",term:"Pain",definition:"An unpleasant sensory and emotional experience associated with actual or potential tissue damage."},{section:"1",term:"Parasympathetic nervous system",definition:"The rest and digest system, which focuses on relaxation and recovery. This is also known as the body's brakes. This system is part of the autonomic nervous system."},{section:"1",term:"Passive stability",definition:"The stability naturally provided by ligaments, bone structures and joints."},{section:"1",term:"Peripheral nervous system",definition:"The cranial nerves and the spinal nerves together are referred to the peripheral nervous system. The peripheral nervous system forms connections from the central nervous system to the organs and tissues and vice versa. The peripheral nervous system consists of sensory and motor nerves."},{section:"1",term:"Physiology",definition:"The biological science that deals with the normal functions of humans and animals that are necessary for life, ranging from the level of the cell to the organism as a whole."},{section:"1",term:"Posterior",definition:"At the back of the body, where the spine is visible."},{section:"1",term:"Posterior chain",definition:"The muscles at the back of the body: calf muscles, hamstrings, gluteus muscles and back muscles (latissimus dorsi and erector spinae)."},{section:"1",term:"Posterior pelvic tilt",definition:"The pelvis is tilted backward."},{section:"1",term:"Proprioception",definition:"The awareness of posture."},{section:"1",term:"Proximal",definition:"Closer to the center point of the body (think heart, navel or torso) as compared to another location. Related to the word proximity."},{section:"1",term:"Range of Motion (ROM)",definition:"The total distance a joint can move in a specific function, usually expressed in degrees."},{section:"1",term:"Sacral",definition:"Referring to the sacrum."},{section:"1",term:"Scoliosis",definition:"A rotation of the spine; vertebrae have a lateral curvature and/or are twisted along the longitudinal axis."},{section:"1",term:"Self-efficacy",definition:"Your confidence in your own ability to succeed at a task or influence your situation. It comes from Bandura's social cognitive theory."},{section:"1",term:"Somatic nervous system",definition:"Voluntary and conscious motor functions."},{section:"1",term:"Spinal column",definition:"Also known as the backbone, spine or the vertebral column."},{section:"1",term:"Stability",definition:"The ability to allow desired movement while resisting unwanted movement. How well you can maintain a position during movement, in other words, overcoming the resistance that tries to pull you out of position."},{section:"1",term:"Static contraction",definition:"The muscle exerts force, but creates no movement. The muscle remains in the same position under tension. Also known as isometric contraction."},{section:"1",term:"Subjective pain",definition:"Pain experienced by an individual based on their personal perception and interpretation of it. It cannot be directly measured or observed by others. Subjective pain depends on various factors, such as a person's pain threshold, emotions, culture, psychological state and previous experiences with pain."},{section:"1",term:"Superior",definition:"Always higher relative to another location."},{section:"1",term:"Sympathetic nervous system",definition:"The fight, flight or freeze system. This is also known as your gas pedal. In this system, your body is in action mode. This system is part of the autonomic nervous system."},{section:"1",term:"Synergist",definition:"The muscle that works with the agonist to support a specific movement. The synergist assists the agonist by providing additional force or stability during the movement. Synergists also reduce unwanted movements from other muscles. They are essential for smooth and efficient execution of movements."},{section:"1",term:"Tension to task",definition:"Matching your core tension to the demand of the task. Think of intra-abdominal pressure as a volume dial you turn up or down to suit what you're doing."},{section:"1",term:"Thoracic",definition:"Referring to the thoracic vertebrae."},{section:"1",term:"Training pain",definition:"The pain that occurs as a result of physical exertion or exercise. It is a normal response of the body to the load applied during training."},{section:"1",term:"Unilateral",definition:"One-sided (for example, training one arm or leg)."},{section:"1",term:"Valsalva maneuver",definition:'A breathing technique used to increase intra-abdominal pressure. You breathe into your abdomen and then "lock" the built-up pressure by closing your throat (glottis).'},{section:"2",term:"Abduction",definition:"Away from the midline or moving away."},{section:"2",term:"Adduction",definition:"Toward the midline or bringing together."},{section:"2",term:"Angular movement",definition:"Some or all parts of a body rotate through the same angle around an axis of rotation. If the movement were completed fully, the body's path would form a perfect circle. This movement is also called rotational (around the rotation axis) or circular."},{section:"2",term:"Anterior pelvic tilt",definition:"Forward tilting of the pelvis."},{section:"2",term:"Attractive force",definition:"A gravitational force that keeps us on the ground and prevents us from floating."},{section:"2",term:"Bar path",definition:"The trajectory the bar follows from its starting position to its end position."},{section:"2",term:"Bilateral",definition:"Involving both sides (for example, performing an exercise with both arms or legs simultaneously)."},{section:"2",term:"Biomechanics",definition:"The study of forces that we exert on objects or our environment, and the forces acting upon us and other organisms, focusing on the moments before, during and after movement."},{section:"2",term:"Butt wink",definition:"A posterior tilt of the pelvis that occurs during a squat, causing the lumbar spine to flex."},{section:"2",term:"Center of gravity",definition:"The point where the body's weight is balanced equally on all sides and around which it can rotate freely. It shifts with body composition and how weight is distributed."},{section:"2",term:"Compound",definition:"A multi-joint exercise involving multiple muscle groups and joints simultaneously. Examples include squats and bench presses."},{section:"2",term:"Contact force",definition:"The force exerted by the floor on our body, preventing us from sinking into the ground."},{section:"2",term:"Dynamic",definition:"An imbalance of forces on the body. This occurs when someone accelerates or decelerates rapidly."},{section:"2",term:"Dynamic valgus",definition:"A sub-movement where the inward motion (adduction and internal rotation) of the knee creates a strong hip position to generate force in the upward phase."},{section:"2",term:"Extension",definition:"The act of straightening or extending."},{section:"2",term:"External",definition:"Outward or outside."},{section:"2",term:"External forces",definition:"Forces acting on an object from the outside."},{section:"2",term:"First-class lever",definition:"The fulcrum or pivot point is located between the force/effort and the resistance."},{section:"2",term:"Flexion",definition:"The act of bending or curving."},{section:"2",term:"Flexion arm",definition:"In a deadlift, a deliberate position where the back is set in a slight curve to shorten the total moment arm. This technique is commonly used by top powerlifters."},{section:"2",term:"Flexion moment",definition:"During a deadlift, it's possible to lose the neutral position as the movement progresses, causing the load-bearing arm to bend and shorten."},{section:"2",term:"Frontal plane",definition:"The plane that divides the body into front and back (anterior and posterior) parts. Movements clearly visible from the front or back occur in this plane, like lateral arm raises (abduction)."},{section:"2",term:"Fulcrum",definition:"The pivot point or axis of rotation."},{section:"2",term:"Gravity",definition:"The downward force acting on an object due to Earth's gravitational pull. It's often represented by a line drawn from the object's center of gravity towards the ground. This concept is also referred to as the line of action, line of pull or the source of resistance or load in exercise mechanics."},{section:"2",term:"Hip dissociation",definition:"The ability to move the hip independent of the back or pelvis."},{section:"2",term:"Hip hinge",definition:"A hip flexion movement. Analogous to a door hinge, the hip can bend (flex) and straighten (extend)."},{section:"2",term:"Intention",definition:"The purpose or goal of an exercise or set."},{section:"2",term:"Internal",definition:"Inward or inside."},{section:"2",term:"Internal forces",definition:"Forces exerted by muscles to pull and push on limbs and joints, producing controlled movements."},{section:"2",term:"Isolation",definition:"An exercise type focusing on moving a single joint to target one specific muscle group. These exercises aim to activate the target muscle without significant involvement from others. Examples include bicep curls for biceps and leg extensions for quadriceps."},{section:"2",term:"Lever",definition:"A rigid object, such as a rod, bar, bone or the spine, that works with a fulcrum to create mechanical advantage. It typically converts a small force and large movement into a larger force with a smaller movement, or vice versa."},{section:"2",term:"Line of pull/action",definition:"The vertical line extending downward from an object's center of gravity. Gravity pulls every object on Earth along this line towards the planet's center, creating load or resistance."},{section:"2",term:"Linear motion",definition:"Movement where all or some parts of a body travel in the same direction. This can follow a perfectly straight path or a slight curve."},{section:"2",term:"Mind map",definition:"A visual representation of information used to organize ideas, concepts, tasks or other data in a structured and clear manner. It is a diagram that typically starts with a central topic or concept and branches out from there into arms representing various subtopics, associations or details."},{section:"2",term:"Moment",definition:"The turning force that sets an object or body part into rotation."},{section:"2",term:"Moment arm",definition:"The distance between where a force is applied and the pivot point (axis of rotation). For a given moment, a larger force needs a shorter moment arm and a smaller force needs a longer one."},{section:"2",term:"Pivot point",definition:"The fulcrum or axis of rotation around which an object rotates."},{section:"2",term:"Posterior pelvic tilt",definition:"Backward tilting of the pelvis."},{section:"2",term:"Progression",definition:"A more challenging variant of an exercise. The opposite of regression."},{section:"2",term:"Regression",definition:"A less challenging variant of an exercise. The opposite of progression."},{section:"2",term:"Sagittal plane",definition:"The plane that divides the body into nearly symmetrical left and right halves. Movements in this plane are visible from the side, such as forward lifting of the thigh or knee."},{section:"2",term:"Say, show, do",definition:"A didactic model in which you first provide explanation (talk), then demonstrate the exercise (show) and conclude with instructions for execution (do)."},{section:"2",term:"Second-class lever",definition:"A type of lever where the load is positioned between the fulcrum and the effort."},{section:"2",term:"Semi-unilateral",definition:"Involving one side of the body (e.g., training one arm or leg) while still receiving support or active assistance from the other side during the movement."},{section:"2",term:"Static",definition:"A state in which opposing forces are equal in magnitude and cancel each other out. This can occur both at rest and during motion with constant velocity (no acceleration or deceleration)."},{section:"2",term:"Third-class lever",definition:"The effort is located between the fulcrum and the load."},{section:"2",term:"Torque",definition:"The force (moment) that sets an object, body or part thereof in motion, resulting in rotation."},{section:"2",term:"Transverse plane",definition:"The plane that divides the body into upper and lower parts (superior and inferior). This horizontal plane is also known as the rotational plane. Examples of movements within this plane include trunk rotation and transverse abduction or adduction of the shoulder."},{section:"2",term:"Unilateral",definition:"Involving one side of the body (for example, training a single arm or leg)."},{section:"2",term:"Valgus",definition:"An inward movement of the knee where it moves beyond the midline of the foot."}],f={"2.5.1":{name:"The Hinge (RDL)",data:{center:{title:"THE HINGE (RDL)",note:" A hip-dominant movement that primarily trains the posterior chain. Minimal knee movement, horizontal hip motion, neutral spine. The RDL is the purest hip hinge that can be loaded maximally — it clearly distinguishes a hinge from a squat."},branches:[{title:"Hinge Variations & Differences",children:[{title:"Variations (all share the hip hinge pattern)",children:[{title:"Conventional deadlift",children:[]},{title:"Sumo deadlift",children:[]},{title:"Good morning",children:[]},{title:"Hip extension",children:[]},{title:"Trap bar deadlift",children:[]},{title:"Snatch grip deadlift",children:[]},{title:"Deficit deadlift",children:[]},{title:"Staggered stance deadlift",children:[]}]},{title:"Most coaching (cycle, demo, explanation) is consistent; differences are nuanced cues",children:[]},{title:"Two factors that distinguish how variations challenge the client",children:[{title:"1. Knee movement",children:[{title:"Minimize knee movement → maximize posterior chain force",children:[]},{title:"Depends on individual ROM/mobility and the objective",children:[]},{title:"RDL = pure hinge, no knee movement",children:[]},{title:"Conventional deadlift: slight knee bend to start (strongest position), finish with hip",children:[]}]},{title:"2. Load on the lower back (bar position)",children:[{title:"Bar close to body = shortest moment arm",children:[]},{title:"Trap bar: bar in line with body (least back load)",children:[]},{title:"RDL: torso leans further forward (more back load)",children:[]},{title:"Good morning: bar on back of shoulders (most back strength)",children:[]},{title:"Back position can be the limiting factor for weight/reps — good if intended, but can cap hip loading if back strength << hip strength",children:[]}]}]},{title:'Grip tip ("don\'t let grip limit you")',children:[{title:"Goal = load the posterior chain; grip can be the limiter",children:[]},{title:"Options: mixed grip, hook grip, straps",children:[]},{title:"Straps improve absolute load + execution quality (research); lifts feel harder without them",children:[]},{title:"Train grip separately only if grip strength is a specific goal",children:[]}]},{title:"Muscles worked",children:[{title:"Role definitions",children:[{title:"Target (prime mover / agonist) — the muscle the exercise is built to train; produces the main force",children:[]},{title:"Synergist — assists the target by helping produce the same joint action in a supporting role",children:[]},{title:"Stabilizer — contracts (often isometrically) to hold a joint/segment steady so the prime movers can work",children:[]}]},{title:"Target: gluteus maximus, hamstrings",children:[]},{title:"Synergist: adductor magnus",children:[]},{title:"Stabilizers: transversus abdominis, erector spinae, pelvic diaphragm, quadratus lumborum, quadriceps femoris, multifidus",children:[]},{title:"Latissimus dorsi: not in the stabilizer roster, but crucial for keeping the bar close / vertical bar path (see Energy Leaks → bar moves away)",children:[]}]}]},{title:"Coaching the RDL",children:[{title:"Starting position checkpoints (same for everyone)",children:[{title:"Neutral torso, 360° tension — ribs over pelvis, ribs low, slight lower-back arch",children:[]},{title:"Neutral thoracic spine — shoulder blades against ribs, don't move",children:[]},{title:"Bar close to body — armpit angle constant, lat tension, bar touching thighs",children:[]},{title:"Foot position — pressure across whole foot, three points of contact",children:[]},{title:"Knee position — knees slightly bent, shins vertical",children:[]}]},{title:"End position checkpoints",children:[{title:"Neutral torso, 360° tension",children:[]},{title:"Bar close — contacting shins, over the middle of the foot",children:[]},{title:"Neutral thoracic spine — shoulders low, upper back stable",children:[]},{title:"Foot position — three points; slight shift toward heel okay",children:[]},{title:"Vertical shins — too bent → pressure to forefoot; too straight → pressure to heel",children:[]}]},{title:"Why checkpoints overlap (and why that helps)",children:[{title:"Bar close → easier to keep foot pressure; neutral torso + upper back → easier to keep bar close",children:[]},{title:"Overlap forces good positions; coach the part that's easiest or most impactful in the chain",children:[]}]},{title:"Eccentric & concentric phase points",children:[{title:"Pure hip movement (eccentric) — hips straight back, horizontal; ribs aligned with pelvis",children:[]},{title:"Pure hip movement (concentric) — hips straight forward; push the ground away with the heel (don't pull the bar up)",children:[]},{title:"Neutral torso 360° tension throughout",children:[]},{title:"Foot position + vertical shins",children:[]}]},{title:"Determining correct depth (3 factors)",children:[{title:"Hamstring flexibility / hip mobility — limited at end of hip ROM",children:[]},{title:"Proximal stiffness — harder to hold torso as back nears horizontal",children:[]},{title:"Hip strength — skill-based; heavy loads may reach less depth than light if untrained through full ROM",children:[]}]}]},{title:"Energy Leaks (orange) — 5 total",children:[{title:"1. Hyperextension",children:[{title:"Core tension lost → lower back over-arches out of neutral",children:[]},{title:"Identify the phase (analyze in order: start → end → eccentric → concentric)",children:[]},{title:'Cue: "taut string from pubic bone to sternum" (no break, no slack); light DB on solar plexus',children:[]}]},{title:"2. Hyperflexion",children:[{title:"Back rounds during the lift",children:[]},{title:"Flexion MOMENT = neutral lost mid-movement (coach against it, add core-tension work)",children:[]},{title:"Flexion ARM = deliberate fixed slight round to shorten moment arm (advanced powerlifters)",children:[]},{title:'Cue: "brace as if punched"; thumbs on lower back, fingers on obliques, press out',children:[]}]},{title:"3. Excessive knee bending or extending",children:[{title:"Hamstrings are bi-articular → need a fixed knee to apply max force at the hip",children:[]},{title:"No forward knee movement; knee angle changes only as the hip travels back",children:[]},{title:"Knee hyperextension shortens hamstrings over two joints + shifts CoG backward",children:[]},{title:'Cue: "lower leg is in a cast"; PVC pipe at the shin; calves to a box',children:[]}]},{title:"4. Hip shift",children:[{title:"Uneven L/R loading → hip deviates from midline; detect via feet/legs",children:[]},{title:"Eccentric: mobility or structure; Concentric: strength difference",children:[]},{title:'Cue: "tear a newspaper apart"; box/hand behind the less-mobile calf',children:[]}]},{title:"5. Bar moves away from the body",children:[{title:"Bar must stay close for a vertical path / CoG over midfoot; lats are key",children:[]},{title:'Cue: "protect your armpits" / "newspaper under armpits" / "shoulder blades into back pockets" / "bend the bar around your thighs"',children:[]},{title:"Kinesthetic: band/hand pulls bar forward, client keeps it on the legs",children:[]}]}]},{title:"Progression Sequence",children:[{title:"1. Banded PVC waiter's bow, calves against a box",children:[{title:"Enforces: neutral spine (PVC, 3 contact points), hip flexion without knee flexion (band + box), backward movement direction (band)",children:[]}]},{title:"2. PVC waiter's bow, calves against a box",children:[{title:"Remove the band; body initiates the horizontal hip movement independently; stable shins + spine",children:[]}]},{title:"3. DB Romanian deadlift, calves against a box",children:[{title:"Swap PVC for weight; box keeps shins vertical; introduce 360° core tension + lat engagement",children:[]}]},{title:"4. DB or barbell Romanian deadlift",children:[{title:"Heavier load (barbell ideal); keep the bar close, sharpen awareness of vertical shins",children:[]}]},{title:"5. Optional: 45-degree hip extension",children:[{title:"Fixed position that requires hip movement; use hand placement for neutral-spine feedback",children:[]}]},{title:"Record yourself (front, side, back) → run the MILO Coaching Method Step 1 (Observe): what's correct? which energy leaks appear?",children:[]}]}]},section:"2"},"2.5.2":{name:"The Squat",data:{center:{title:"THE SQUAT",note:" Simultaneous knee + hip flexion/extension → vertical movement. Trains quads & glutes, less posterior chain than the hinge. Goal: keep center of gravity over the midfoot."},branches:[{title:"Squatology",children:[{title:"Movement pattern",children:[{title:"Knee and hip move simultaneously → more vertical than the horizontal hinge",children:[]},{title:"Emphasis on quads + glutes; less posterior chain",children:[]}]},{title:"Variations (defined by bar position / load)",children:[{title:"Low bar back squat",children:[]},{title:"High bar back squat",children:[]},{title:"Front squat",children:[]},{title:"Overhead squat",children:[]},{title:"Safety bar squat",children:[]},{title:"Goblet squat",children:[]}]},{title:"Bar position effects",children:[{title:"Load position shifts the center of gravity → changes torso/hip angle to keep CoG over base of support",children:[]},{title:"Low bar → front squat = progression from bar-low-on-back to forward-on-chest",children:[]}]},{title:"Muscle activation (the nuance)",children:[{title:"Studies conflict: some show hip/hamstring/quad differences, others show none (3,4,5)",children:[]},{title:"Greater range of motion → more activation",children:[]},{title:"Eccentric vs concentric activation differs for all working muscles",children:[]},{title:'Front squat: lower back-risk, more knee activation → often "preferred," but choice is somewhat arbitrary',children:[]},{title:"KEY: muscle activation ≠ force generation ≠ proof of growth stimulus",children:[]}]},{title:"Muscles worked",children:[{title:"Role definitions",children:[{title:"Target (prime mover / agonist) — the muscle the exercise is built to train; produces the main force for the movement",children:[]},{title:"Synergist — assists the target by helping produce the same joint action in a supporting role",children:[]},{title:"Stabilizer — contracts (often isometrically) to hold a joint or body segment steady so the prime movers can work; doesn't drive the movement",children:[]}]},{title:"Target: gluteus maximus, quadriceps femoris",children:[]},{title:"Synergists: hamstrings, gastrocnemius, soleus",children:[]},{title:"Stabilizers: abdominals, erector spinae, upper trapezius, anterior deltoid, pelvic diaphragm",children:[]},{title:"Latissimus dorsi: minor stabilizer (torso bracing + bar control, more so under heavy load / back squat); not a prime mover or synergist",children:[]}]},{title:"Maximum squat depth (4 lenses)",children:[{title:"Mobility — large ROM needed at ankle, knee, hip; ankle & hip can limit depth",children:[]},{title:"Sport — min depth usually just below 90° / below parallel / hip crease below knee top",children:[{title:"Powerlifting: controlled squat to minimum depth",children:[]},{title:"Olympic weightlifting: max depth + mobility, every cm counts",children:[]}]},{title:"Goal — match depth to the client's personal goals",children:[]},{title:"Principle — \"you won't strengthen what you don't train\"",children:[]}]}]},{title:"Coaching the Front Squat",children:[{title:"Grips (3 variations)",children:[{title:"Zombie / no hands",children:[{title:"+ Teaches perfect posture; strengthens upper back",children:[]},{title:"− Light loads only; bar falls off easily; needs fully upright squat",children:[]}]},{title:"Crossover / hands inside shoulders",children:[{title:"+ Stable, low mobility demand, universal, allows heavy loading",children:[]},{title:"− Compromises upper back tension; thoracic flexion risk; hard to control bar shifts",children:[]}]},{title:"Olympic full grip / hands outside shoulders",children:[{title:"+ Most stable; multifunctional (weightlifting/CrossFit)",children:[]},{title:"− Needs lots of wrist/shoulder/upper-back mobility; discomfort; limits heavy loading",children:[]}]}]},{title:"Starting position checkpoints (top)",children:[{title:"Upper back tension with slight extension — proud posture, elbows near horizontal",children:[]},{title:"Bar placement — sits just behind shoulders, lightly touching throat",children:[]},{title:"Neutral torso, 360° tension — ribs over hips, slight lower-back arch",children:[]},{title:"Foot positioning — pressure across whole foot, three contact points",children:[]}]},{title:"End position checkpoints (bottom)",children:[{title:"Hips between heels — bar over midfoot, max depth",children:[]},{title:"Upper back tension / slight extension — bar held without hands",children:[]},{title:"Bar placement — no forward shift",children:[]},{title:"Neutral torso, 360° tension",children:[]},{title:"Foot position — three contact points, emphasis ball of foot",children:[]},{title:"Knee position — knees track over toes (little↔big toe)",children:[]}]},{title:"Eccentric & concentric checkpoints",children:[{title:"Knee + hip coordination (eccentric) — move together, even foot pressure, bar lowers vertically over midfoot",children:[]},{title:"Knee + hip coordination (concentric) — drive up vertically, knees/hips/ankles extend together",children:[]},{title:'Upper back tension (concentric) — chest up "beaming lasers forward," drive ground away',children:[]},{title:"Neutral torso 360° (both phases)",children:[]},{title:"Foot position + knee tracking",children:[]}]}]},{title:"Mobility Limitations",children:[{title:"1. Ankle (dorsiflexion)",children:[{title:"Knee must travel over toes; limited → heel lifts/collapses inward, toes rotate out",children:[]},{title:"Compensations: restricted knee flexion, hip over-bends, bar forward, lumbar hyperextension",children:[]},{title:"Tests/work: 5-inch wall test; band distraction stretch; split-squat ISO (soleus); deep goblet hold",children:[]}]},{title:"2. Hip",children:[{title:"Need to rotate thigh in socket to set hips between heels",children:[]},{title:"Limited / structural → forward lean → less vertical force + more lower-back strain (longer moment arm)",children:[]},{title:"Structure varies: deeper socket = less range; femoral head shape affects depth & butt wink",children:[]},{title:"Work: foot-position protocol (width + toe-out, half-foot increments); lateral squat; half-kneeling adductor dip; step-overs",children:[]}]},{title:"3. Upper back",children:[{title:"Positions bar over midfoot; front squat demands most, low bar back squat least",children:[]},{title:"Rounding shifts bar forward / drops elbows → more compensation",children:[]},{title:"Work: bench T-spine extension (lats, triceps, shoulder, thoracic together)",children:[]}]},{title:"Key distinction: mobility (trainable) vs structure (work around)",children:[]}]},{title:"Energy Leaks (orange) — 6 total",children:[{title:"1. Hyperextension",children:[{title:"Ribs rise, lower-back arch increases; pelvis tilts anterior",children:[]},{title:'Cue: "taut string from pubic bone to sternum — don\'t break or slacken"; push ground away',children:[]}]},{title:"2. Stripper squat",children:[{title:"Knees extend first, hips shoot up early, bar drifts forward",children:[]},{title:"Causes: bar in front of midfoot; posterior/anterior strength imbalance; Lombard's paradox; heel-heavy pressure",children:[]},{title:'Cue: "buttocks slide along a pole"; PVC pipe in front; bar/object behind hips',children:[]}]},{title:"3. Knee valgus",children:[{title:"Knee crosses foot midline (adduction + internal rotation)",children:[]},{title:"Dynamic valgus can be a strong position; coach beginners away from it",children:[]},{title:"Cause: limited internal rotation, weak hip tension/foot stability",children:[]},{title:'Cue: "tear a newspaper apart under your feet"; band around knees (RNT)',children:[]}]},{title:"4. Hip shift",children:[{title:"Uneven L/R pressure; bigger ROM than RDL so mobility/structure matter more",children:[]},{title:"Often paired with one-knee valgus",children:[]},{title:'Cue: "screw feet into ground, even pressure"; assess L/R mobility; band around knees',children:[]}]},{title:"5. Upper back hyperflexion",children:[{title:"Upper back rounds, bar drifts forward; erector spinae + traps lose isometric tension",children:[]},{title:'Cue: "proud chest, steady elbows, push bar inward"; zombie front squats; pause reps',children:[]}]},{title:"6. Butt wink",children:[{title:"Posterior pelvic tilt at bottom → lumbar flexion, loss of core stiffness",children:[]},{title:'Cue: "brace as if punched, hold tension at the bottom"; med ball under hips at safe depth',children:[]}]}]},{title:"Progression Sequence",children:[{title:"1. Banded goblet box squat",children:[{title:"Enforces: core (goblet load), abductors (band/RNT), vertical descent (box)",children:[]},{title:"Box = depth feedback + guides hips between heels",children:[]}]},{title:"2. Paused goblet box squat",children:[{title:"Remove band; focus foot pressure + knee position; box still guides depth; assess if depth can increase",children:[]}]},{title:"3. Paused goblet squat",children:[{title:"Remove box; pause where the box was; client finds optimal depth; contrast correct vs exaggerated butt wink",children:[]}]},{title:"4. Front squat",children:[{title:"Apply all goblet lessons + maintain bar position; harder to brace with bar vs KB",children:[]},{title:"Breathe, build 360° tension, proud chest, hips between heels",children:[]}]},{title:"Record yourself (front, side, back) → run the MILO Coaching Method Step 1 (Observe): correct points? energy leaks?",children:[]}]}]},section:"2"},"s1-core":{name:"The Core & Breathing",section:"1",data:{center:{title:"THE CORE",note:"A cylinder that transfers force and protects the spine: diaphragm on top, pelvic floor below, abdominals and spinal muscles around the sides."},branches:[{title:"Anatomy",children:[{title:"Rectus abdominis — trunk flexion"},{title:"Obliques — rotation & side-bend"},{title:"Transversus abdominis — compresses abdomen"},{title:"Erector spinae — extends & stabilises spine"},{title:"Diaphragm — breathing + stability"},{title:"Pelvic floor — base of the cylinder"}]},{title:"360° Breathing",children:[{title:"Pressure rises in the abdomen"},{title:"Ribcage expands front, side, back"},{title:"Breathe into the belly, not the chest"},{title:"Brace = breath + tension"}]},{title:"Core function",children:[{title:"Resist motion, not just crunch"},{title:"Anti-extension (plank)"},{title:"Anti-rotation (Pallof press)"},{title:"Anti-lateral-flexion (suitcase carry)"},{title:"Transfer force hips ↔ shoulders"}]},{title:"Training",children:[{title:"Stiffness & endurance over max reps"},{title:"Progress leverage / load / instability"},{title:"Integrate into the big lifts"}]}]}},"s1-neuro":{name:"Neuromuscular & Motor Control",section:"1",data:{center:{title:"NEUROMUSCULAR SYSTEM",note:"The network of nerves and muscles that controls and coordinates movement."},branches:[{title:"Nervous system",children:[{title:"Brain"},{title:"Spinal cord"},{title:"Peripheral nerves"},{title:"Senses & commands movement"}]},{title:"Muscular system",children:[{title:"Executes movement"},{title:"Motor unit = neuron + its fibres"},{title:"Recruitment & rate coding scale force"}]},{title:"Motor control",children:[{title:"Coordinate muscles for smooth motion"},{title:"Reflexes & feedback loops"}]},{title:"Motor learning",children:[{title:"Cognitive → Associative → Autonomous"},{title:"Intrinsic vs extrinsic feedback"},{title:"Variability builds robust skill"},{title:"Skill before load"}]}]}},"s2-biomech":{name:"Biomechanics",section:"2",data:{center:{title:"BIOMECHANICS",note:"The forces, levers and torque that govern how movement loads the body."},branches:[{title:"Torque & moment arm",children:[{title:"Torque = force × moment arm"},{title:"Longer arm = more joint load"},{title:"Keep the load close to the body"}]},{title:"Planes of motion",children:[{title:"Sagittal — flexion / extension"},{title:"Frontal — abduction / adduction"},{title:"Transverse — rotation"}]},{title:"Stability",children:[{title:"Centre of gravity over base of support"},{title:"Bar path stays vertical"},{title:"Wider base = more stable"}]},{title:"Resistance profiles",children:[{title:"Ascending — dumbbells load the top"},{title:"Descending — cables load the start"},{title:"Bell-shaped — peaks in the middle"},{title:"Match profile to the sticking point"}]}]}},"s3-upper":{name:"Upper Body Patterns",section:"3",data:{center:{title:"UPPER BODY PATTERNS",note:"Four pressing and pulling patterns — always balance push volume with pull."},branches:[{title:"Horizontal push",children:[{title:"Push-up & bench press"},{title:"Scapula free in push-up, set on bench"},{title:"Progress incline → flat → loaded"}]},{title:"Horizontal pull",children:[{title:"Row family"},{title:"Lead with the elbow, finish retract"},{title:"Balances horizontal push"}]},{title:"Vertical push",children:[{title:"Overhead press"},{title:"Needs shoulder flexion + T-spine extension"},{title:"Ribs down, glutes braced"},{title:"Progress half-kneeling → standing"}]},{title:"Vertical pull",children:[{title:"Chin-up / pulldown"},{title:"Depress & retract the scapula"},{title:"Don't start chin-ups too early"},{title:"Grip can limit — use straps"}]},{title:"Coaching logic",children:[{title:"Progress semi-vertical → full pattern"},{title:"Observe, then cue the biggest fault"},{title:"Verbal / visual / kinesthetic cues"}]}]}},"s4-stress":{name:"Stress & Adaptation",section:"4",data:{center:{title:"STRESS & ADAPTATION",note:"Training is a stressor; the body adapts only to stress it can recover from."},branches:[{title:"Everything is stress",children:[{title:"GAS: alarm → resistance → exhaustion"},{title:"Stress bucket stacks training + life"},{title:"Use the smallest effective dose"}]},{title:"How the body changes",children:[{title:"Adaptation raises the setpoint"},{title:"Progressive overload = deliberate choice"},{title:"Progression = the resulting outcome"},{title:"SAID — specific adaptations"}]},{title:"Overload levers",children:[{title:"Intensity"},{title:"Volume"},{title:"Frequency"},{title:"Duration"}]},{title:"Lifestyle",children:[{title:"Sleep — primary recovery lever"},{title:"Nutrition supplies the material"},{title:"Non-training stress lowers capacity"},{title:"Sustainable habits win"}]}]}},"s4-energy":{name:"Energy Systems",section:"4",data:{center:{title:"ENERGY SYSTEMS",note:"How the body produces ATP across three systems, matched to the demand."},branches:[{title:"ATP-PC (a-lactic)",children:[{title:"Immediate energy, ~0–10 s"},{title:"Maximal power efforts"},{title:"Fuelled by phosphocreatine"}]},{title:"Anaerobic glycolysis",children:[{title:"Seconds up to ~2 min"},{title:"High-intensity work"},{title:"Produces lactate"},{title:"Glucose as fuel"}]},{title:"Aerobic",children:[{title:"Long duration"},{title:"Uses oxygen"},{title:"Burns fat & carbohydrate"},{title:"Builds the endurance base"}]},{title:"Programming",children:[{title:"Match system to the client goal"},{title:"Exercise selection"},{title:"Progressive overload in conditioning"},{title:"Adaptations differ per system"}]}]}}},g={1:{name:"Thinking in Movement",blurb:"The foundations: how the body produces and controls movement, the core, breathing, the neutral zone, motor learning, and the Milo coaching method."},2:{name:"Lower Body",blurb:"Biomechanics and lower-body anatomy, then the two foundational patterns — the hinge and the squat — plus how to coach and progress them."},3:{name:"Upper Body",blurb:"Upper-body anatomy and coaching across the four pressing/pulling patterns: horizontal push, horizontal pull, vertical push, vertical pull."},4:{name:"Adaptation & Energy",blurb:"Why the body changes — stress, recovery, and lifestyle — plus the energy systems and how to coach a group class."},muscles:{name:"Muscle Reference",blurb:"Origin, insertion and function reference cards for the major muscles."}},b={"1.1.2":{title:"Thinking in Movement",overview:"Movement is the body moving from A to B over time, driven by muscle contraction. Understanding the body as a frame (skeleton) with elastics (muscles) over pulleys (joints) makes coaching tangible.",points:["Three contraction types: isometric (force, no length change), concentric (muscle shortens, against resistance), eccentric (muscle lengthens, with gravity).","Muscles pull, never push; they work in agonist/antagonist pairs.","Movement quality is trainable — the trainer's job is to build efficient, controlled motion.","A lever system: muscle contraction sets bony levers in motion around joints."]},"1.1.3":{title:"Anatomy of the Core",overview:"The core is a cylinder: diaphragm on top, pelvic floor on the bottom, abdominals and multifidus/erector spinae around the sides. Its job is to transfer force and protect the spine.",points:["Rectus abdominis flexes the trunk; obliques rotate and side-bend; transversus abdominis compresses the abdomen for stability.","The diaphragm is both a breathing muscle and a core stabiliser.","Erector spinae extends and stabilises the spine.","Core function is about stiffness and force transfer, not just 'ab' exercises."]},"1.1.4":{title:"The Neuromuscular System",overview:"A network of nerves and muscles that controls and coordinates movement. Nervous system (brain, spinal cord, peripheral nerves) senses and commands; muscular system executes.",points:["Motor control = coordinating muscles to produce smooth, purposeful movement.","A motor unit is one motor neuron plus all the fibres it controls.","Recruitment and rate coding scale force output.","Practice rewires neural patterns — skill before load."]},"1.1.5":{title:"Breathing",overview:"360-degree breathing raises intra-abdominal pressure and expands the ribcage forward, sideways and backward, creating a stable base for the spine to work against.",points:["Breathing and bracing are linked — breathe into the belly, not the chest.","Intra-abdominal pressure stabilises the trunk under load.","The Valsalva-style brace is used for heavy lifting.","Poor breathing patterns leak stability and reduce force transfer."]},"1.1.6":{title:"Neutral Zone",overview:"The neutral zone is the small range around a joint's neutral position where movement meets little resistance and the passive structures are least stressed. Training here first builds safe, controlled control.",points:["Neutral spine keeps ribs stacked over the pelvis.","Active stability holds joints in position against unwanted movement.","Coaching starts by finding and owning neutral, then loading it.","Leaving neutral under load is a common source of energy leaks."]},"1.1.7":{title:"Motor Skills",overview:"Motor learning moves a client from clumsy, attention-heavy movement to automatic, efficient movement through stages of practice and feedback.",points:["Stages: cognitive (figuring it out) → associative (refining) → autonomous (automatic).","Feedback types: intrinsic (felt) and extrinsic (from the coach).","Constraints and variability build robust skills.","Less, better-timed feedback often beats constant correction."]},"1.1.9":{title:"Core Training",overview:"Train the core for its real job: resisting motion (anti-flexion, anti-extension, anti-rotation, anti-lateral-flexion) and transferring force, rather than only producing crunches.",points:["Anti-extension (e.g. plank), anti-rotation (e.g. Pallof press), anti-lateral-flexion (e.g. suitcase carry).","Stiffness and endurance often matter more than max reps.","Progress by increasing leverage, load or instability.","Integrate core control into the big lifts, not just as isolation work."]},"2.2":{title:"Biomechanics",overview:"The mechanics of movement: forces, levers, torque and the planes/axes of motion. Understanding moment arms explains why bar position and joint angles change difficulty and muscle loading.",points:["Torque = force × moment arm; a longer moment arm means more load on the joint/muscle.","Planes: sagittal (flexion/extension), frontal (abduction/adduction), transverse (rotation).","Keeping the load close to the body shortens the moment arm and the effort.","Bar path and centre of gravity over the base of support govern stability."]},"2.3":{title:"Anatomy of the Lower Body",overview:"The prime movers of the lower body and their roles: glutes, quads, hamstrings, adductors and calves, plus how they act as target, synergist or stabiliser in a lift.",points:["Gluteus maximus: hip extension, the engine of hinge and squat.","Quadriceps: knee extension (squat-dominant).","Hamstrings: bi-articular — hip extension and knee flexion (hinge-dominant).","Adductors assist hip extension; calves (gastroc/soleus) manage the ankle."]},"2.5.1":{title:"The Hinge (RDL)",overview:"A hip-dominant pattern that trains the posterior chain: horizontal hip motion, minimal knee movement, neutral spine. The RDL is the purest loadable hinge. See the full mind map for details.",points:["Target: glutes + hamstrings; keep the bar close for a vertical path.","5 energy leaks: hyperextension, hyperflexion, excessive knee movement, hip shift, bar drifting away.","Depth is set by hamstring mobility, proximal stiffness and hip strength.","Progression: banded PVC waiter's bow → PVC bow → DB RDL → barbell RDL."]},"2.5.2":{title:"The Squat",overview:"Simultaneous knee and hip flexion/extension producing vertical movement; quad- and glute-dominant. Goal: keep centre of gravity over the midfoot. See the full mind map for details.",points:["Bar position (low bar → front) shifts the centre of gravity and torso angle.","6 energy leaks: hyperextension, stripper squat, knee valgus, hip shift, upper-back hyperflexion, butt wink.","Depth limited by ankle, hip and upper-back mobility vs structure.","Progression: banded goblet box squat → paused goblet box → paused goblet → front squat."]},"3.2":{title:"Biomechanics (Upper Body)",overview:"Applies force, lever and resistance-profile principles to upper-body training — how free weights vs cables change where a movement is hardest.",points:["Resistance profiles: ascending, descending, bell-shaped.","Dumbbells load the top of a raise (ascending); cables can load the start (descending).","Match the resistance profile to the target and the client's sticking point.","Moment arm still governs joint load in the upper body."]},"3.3":{title:"Anatomy of the Upper Body",overview:"The pushing and pulling musculature: chest, shoulders, back and arms, and their roles across horizontal and vertical patterns.",points:["Pecs and anterior delts drive pressing; lats and mid-back drive pulling.","Scapular control underpins healthy shoulder movement.","Rotator cuff stabilises the glenohumeral joint.","Biceps/triceps assist as synergists in most compound pulls/presses."]},"3.4":{title:"Coaching (Upper Body)",overview:"How to observe, cue and correct upper-body lifts using the Milo coaching method, with progression logic common to all four patterns.",points:["Progressions run from semi-vertical (high-to-low) toward the full pattern.","Observe first, then cue the highest-impact fault.","Use verbal, visual and kinesthetic cues.","Build joint control before adding external load."]},"3.5":{title:"Horizontal Push & Pull",overview:"Pressing and rowing in the horizontal plane — push-ups/bench and rows — and how they balance each other.",points:["Push-up progression builds from an incline toward the floor.","Row progression trains scapular retraction and a controlled pull.","Balance horizontal push volume with horizontal pull for the shoulders.","Keep ribs down and core braced to avoid overextension."]},"3.5.1":{title:"Horizontal Push",overview:"Push-up and bench-press family: coaching cues, scapular movement and progression.",points:["Scapulae move freely in the push-up; set on the bench.","Elbow angle manages shoulder stress.","Full-body tension improves force transfer.","Progress incline → flat → loaded."]},"3.5.2":{title:"Horizontal Pull",overview:"Row family: retract and control, matching resistance to the client's ability.",points:["Lead with the elbow, finish with scapular retraction.","Avoid shrugging — keep the neck long.","Support options (chest-supported, single-arm) manage difficulty.","Balances the horizontal push."]},"3.6":{title:"Vertical Push & Pull",overview:"Overhead pressing and pull-ups/pulldowns — the most mobility-demanding upper-body patterns.",points:["Overhead press needs shoulder flexion and thoracic extension.","Vertical pull (chin-up/pulldown) trains the lats through a long range.","Don't start chin-ups too early — use assisted progressions.","Ribs-down bracing prevents lumbar overextension overhead."]},"3.6.1":{title:"Vertical Push",overview:"Overhead press coaching and progression.",points:["Bar/dumbbell path stays over the midfoot.","Glutes and core resist overextension.","Progress half-kneeling → standing → loaded.","Mobility screen before loading overhead."]},"3.6.2":{title:"Vertical Pull",overview:"Chin-up / pulldown coaching and progression.",points:["Initiate by depressing and retracting the scapulae.","Full range from a hollow hang to chin over bar.","Progressions: pulldown / band-assisted / eccentric-only.","Grip can limit — use straps if the goal is the back."]},"4.2.1":{title:"Everything is Stress",overview:"Training is a stressor. The body adapts to stress it can recover from (the General Adaptation Syndrome: alarm → resistance → exhaustion). Total load includes life, not just training.",points:["Adaptation needs stress + recovery; without recovery you drift toward overtraining.","Stressors stack: training, sleep, nutrition, work, emotional load.","Manage the whole 'stress bucket', not just gym volume.","The right dose is the smallest that drives adaptation."]},"4.2.2":{title:"How the Body Changes",overview:"Adaptation raises a setpoint; progressive overload is the deliberate increase of stimulus to keep driving change as the client gets fitter.",points:["Progressive overload = the trainer's deliberate choice; progression (stronger, more reps) is the outcome.","Levers: intensity, volume, frequency, duration.","Adaptations are specific to the stimulus (SAID principle).","Recovery and consistency turn stimulus into lasting change."]},"4.2.3":{title:"Lifestyle & the Training Process",overview:"Sleep, nutrition, stress and daily activity determine how well a client adapts. Coaching the lifestyle is part of coaching the training.",points:["Sleep is the primary recovery lever.","Nutrition supplies the material for adaptation.","Non-training stress reduces training capacity.","Small, sustainable habits beat perfect but unsustainable plans."]}},y=[{section:"3",q:"In a push-up, how do the scapulae behave compared to the bench press?",answer:"They move freely (protract and retract), whereas on the bench they are set and fixed.",options:["They move freely (protract and retract), whereas on the bench they are set and fixed.","They stay fixed in both movements.","They only retract, never protract.","They are irrelevant to the push-up."]},{section:"3",q:"Which upper-body pattern is generally the most mobility-demanding?",answer:"Vertical push (overhead press), needing shoulder flexion and thoracic extension.",options:["Vertical push (overhead press), needing shoulder flexion and thoracic extension.","Horizontal pull (row).","Horizontal push (bench).","Biceps curl."]},{section:"3",q:"What is the general direction of an upper-body progression sequence?",answer:"From semi-vertical (high-to-low) toward the full pattern.",options:["From semi-vertical (high-to-low) toward the full pattern.","From heaviest to lightest load.","From bilateral straight to single-arm only.","Random order based on preference."]},{section:"3",q:"How should a row be initiated and finished?",answer:"Lead with the elbow and finish with scapular retraction.",options:["Lead with the elbow and finish with scapular retraction.","Shrug the shoulders up first.","Pull with the wrists and round the back.","Start with full elbow extension locked."]},{section:"3",q:"Why avoid starting a client on chin-ups too early?",answer:"They demand high relative strength; use assisted or eccentric progressions first.",options:["They demand high relative strength; use assisted or eccentric progressions first.","Chin-ups are unsafe for everyone.","They only train the biceps.","They require special equipment nobody has."]},{section:"3",q:"When grip is the limiter in a vertical pull but the goal is the back, what helps?",answer:"Using straps so the lats, not the grip, are the limiting factor.",options:["Using straps so the lats, not the grip, are the limiting factor.","Always training grip to failure first.","Switching to a machine press.","Reducing range of motion drastically."]},{section:"3",q:"How do dumbbell and cable resistance profiles differ on a raise?",answer:"Dumbbells load the top of the movement (ascending); c
